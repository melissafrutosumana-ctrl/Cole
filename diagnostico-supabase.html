<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Supabase</title>
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }
        h1 {
            color: #58a6ff;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
        }
        .test {
            margin: 15px 0;
            padding: 10px;
            border-left: 3px solid #30363d;
            background: #0d1117;
        }
        .success { border-left-color: #3fb950; color: #3fb950; }
        .error { border-left-color: #f85149; color: #f85149; }
        .warning { border-left-color: #ffd700; color: #ffd700; }
        .info { border-left-color: #58a6ff; color: #58a6ff; }
        
        button {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #2ea043;
        }
        
        .output {
            background: #010409;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnóstico de Supabase</h1>
        
        <div class="test info">
            <strong>📋 Paso 1: Verificar credenciales</strong>
            <button onclick="verificarCredenciales()">Probar conexión</button>
            <div id="output1" class="output"></div>
        </div>

        <div class="test info">
            <strong>📊 Paso 2: Verificar tabla "imagenes"</strong>
            <button onclick="verificarTabla()">Probar tabla</button>
            <div id="output2" class="output"></div>
        </div>

        <div class="test info">
            <strong>🪣 Paso 3: Verificar bucket "imagenes"</strong>
            <button onclick="verificarBucket()">Probar bucket</button>
            <div id="output3" class="output"></div>
        </div>

        <div class="test info">
            <strong>📤 Paso 4: Verificar permisos de lectura</strong>
            <button onclick="verificarPermisos()">Probar permisos</button>
            <div id="output4" class="output"></div>
        </div>

        <div class="test warning">
            <strong>⚠️ Soluciones comunes:</strong>
            <div id="output5" class="output" style="max-height: none;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

        async function verificarCredenciales() {
            const output = document.getElementById('output1');
            output.innerHTML = '⏳ Probando conexión...';

            try {
                const res = await fetch(`${SUPABASE_URL}/auth/v1/version`, {
                    headers: {
                        apikey: SUPABASE_KEY
                    }
                });

                if (res.ok) {
                    output.innerHTML = `✅ Conexión exitosa
Supabase URL: ${SUPABASE_URL}
Status: ${res.status} ${res.statusText}
Respuesta: ${await res.text()}`;
                    output.parentElement.className = 'test success';
                } else {
                    output.innerHTML = `❌ Error de conexión
Status: ${res.status} ${res.statusText}
Posible causa: API Key inválida o expirada`;
                    output.parentElement.className = 'test error';
                }
            } catch (e) {
                output.innerHTML = `❌ Error de red
${e.message}
Verifica que la URL sea correcta: ${SUPABASE_URL}`;
                output.parentElement.className = 'test error';
            }
        }

        async function verificarTabla() {
            const output = document.getElementById('output2');
            output.innerHTML = '⏳ Verificando tabla "imagenes"...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/imagenes?select=count&limit=1`, {
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${SUPABASE_KEY}`
                    }
                });

                const texto = await res.text();
                
                if (res.status === 400) {
                    output.innerHTML = `❌ Error 400 - Bad Request
Respuesta: ${texto}

Causas posibles:
1. La tabla "imagenes" NO existe
2. Las columnas no tienen los nombres correctos
3. Hay un error en la estructura de la tabla

SOLUCIÓN:
Debes crear la tabla en Supabase con:
- id (BIGINT PRIMARY KEY)
- url (TEXT)
- destino (TEXT)
- descripcion (TEXT)
- created_at (TIMESTAMP)`;
                    output.parentElement.className = 'test error';
                } else if (res.ok) {
                    output.innerHTML = `✅ Tabla "imagenes" encontrada
Status: ${res.status}
Respuesta: ${texto}`;
                    output.parentElement.className = 'test success';
                } else {
                    output.innerHTML = `❌ Error ${res.status}
Respuesta: ${texto}`;
                    output.parentElement.className = 'test error';
                }
            } catch (e) {
                output.innerHTML = `❌ Error de conexión
${e.message}`;
                output.parentElement.className = 'test error';
            }
        }

        async function verificarBucket() {
            const output = document.getElementById('output3');
            output.innerHTML = '⏳ Verificando bucket "imagenes"...';

            try {
                const res = await fetch(`${SUPABASE_URL}/storage/v1/bucket/imagenes`, {
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${SUPABASE_KEY}`
                    }
                });

                const texto = await res.text();
                
                if (res.status === 404) {
                    output.innerHTML = `⚠️ Bucket "imagenes" NO existe
Status: 404

SOLUCIÓN:
Ir a Supabase Dashboard > Storage > New bucket
Crear un bucket llamado: imagenes
Configuración: Hacer público para poder verlas`;
                    output.parentElement.className = 'test warning';
                } else if (res.ok) {
                    output.innerHTML = `✅ Bucket "imagenes" encontrado
Status: ${res.status}
Respuesta: ${texto}`;
                    output.parentElement.className = 'test success';
                } else {
                    output.innerHTML = `❌ Error ${res.status}
Respuesta: ${texto}`;
                    output.parentElement.className = 'test error';
                }
            } catch (e) {
                output.innerHTML = `❌ Error de conexión
${e.message}`;
                output.parentElement.className = 'test error';
            }
        }

        async function verificarPermisos() {
            const output = document.getElementById('output4');
            output.innerHTML = '⏳ Verificando permisos de lectura...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/imagenes?limit=1`, {
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (res.ok) {
                    output.innerHTML = `✅ Permisos de lectura configurados correctamente
Status: ${res.status}`;
                    output.parentElement.className = 'test success';
                } else {
                    output.innerHTML = `❌ Error ${res.status}
Puede ser un problema de permisos RLS

SOLUCIÓN:
Ve a Supabase Dashboard > Authentication > Policies
Asegúrate de tener permisos de lectura para anon (usuario anónimo)`;
                    output.parentElement.className = 'test error';
                }
            } catch (e) {
                output.innerHTML = `❌ Error de conexión
${e.message}`;
                output.parentElement.className = 'test error';
            }
        }

        // Mostrar soluciones al cargar
        window.addEventListener('DOMContentLoaded', function() {
            const output = document.getElementById('output5');
            output.innerHTML = `
CHECKLIST - ¿Qué verificar en Supabase?

1. ✓ ¿Existe la tabla "imagenes"?
   Dashboard > SQL Editor
   CREATE TABLE IF NOT EXISTS imagenes (
     id BIGINT PRIMARY KEY GENERATED ALWAYS AS IDENTITY,
     url TEXT NOT NULL,
     destino TEXT NOT NULL,
     descripcion TEXT,
     created_at TIMESTAMP DEFAULT NOW()
   );

2. ✓ ¿Existe el bucket "imagenes"?
   Dashboard > Storage > New bucket > "imagenes"
   Hacer PÚBLICO el bucket

3. ✓ ¿Están habilitados los permisos RLS?
   Dashboard > Authentication > Policies
   Agregar permiso SELECT para anon (usuario anónimo)

4. ✓ ¿Es la API Key válida?
   Dashboard > Settings > API
   Copiar la ANON_PUBLIC_KEY (la que usamos)

5. ✓ ¿No hay CORS bloqueado?
   Supabase permite requests desde cualquier origen

CREDENCIALES ACTUALES:
URL: ${SUPABASE_URL}
Key: ${SUPABASE_KEY.substring(0, 50)}...

¡Haz clic en los botones arriba para probar cada parte!
`;
        });
    </script>
</body>
</html>
