<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Docentes - CTP Matapalo</title>
    <link rel="stylesheet" href="stylo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a4c23 0%, #1a6b3a 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .form-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 30px;
            background: #f5f1e8;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 2px solid #0a4c23;
        }

        .form-container h1 {
            text-align: center;
            color: #0a4c23;
            margin-bottom: 30px;
        }

        .form-container > div {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-container img {
            height: 60px;
            margin: 0 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            color: #0a4c23;
            font-weight: bold;
            text-align: left;
            margin-bottom: 5px;
            display: block;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #d4ccc0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: #333;
            box-sizing: border-box;
        }

        input::placeholder, textarea::placeholder {
            color: #999;
        }

        button {
            padding: 12px;
            background: #0a4c23;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #1a6b3a;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(10, 76, 35, 0.4);
        }

        .mensaje {
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        .éxito {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #0a4c23;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #d9534f;
        }

        .mensaje.show {
            display: block;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: #0a4c23;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            background: #1a6b3a;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="form-container">
        <div>
            <img src="LOGO MEP.png" alt="Logo MEP">
            <img src="escudo sin fondo.png" alt="Escudo CTP">
        </div>

        <h1><i class="fas fa-user-check"></i> Registro de Docentes</h1>

        <form id="miFormulario">

            <div style="margin-bottom: 15px;">
                <label for="nombre"><i class="fas fa-user"></i> Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="email"><i class="fas fa-envelope"></i> Correo Institucional:</label>
                <input type="email" id="email" name="email" required placeholder="correo@mep.go.cr">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="password"><i class="fas fa-key"></i> Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Crea una contraseña segura">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="materia"><i class="fas fa-book"></i> Materia/Especialidad:</label>
                <textarea id="materia" name="materia" rows="3" placeholder="Describe tu materia o especialidad..."></textarea>
            </div>

            <button type="submit"><i class="fas fa-check"></i> REGISTRARSE</button>

            <a href="registrarme.html"><i class="fas fa-arrow-left"></i> Volver al Login</a>

        </form>

        <div class="mensaje" id="mensaje"></div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'TU_API_KEY_AQUI';

        const form = document.getElementById('miFormulario');
        const mensajeDiv = document.getElementById('mensaje');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const materia = document.getElementById('materia').value;

            /* 🔥 VALIDACIÓN CORREO MEP */
            if (!email.endsWith("@mep.go.cr")) {
                mensajeDiv.textContent = '❌ Solo se permiten correos institucionales (@mep.go.cr)';
                mensajeDiv.className = 'mensaje error show';
                return;
            }

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/todos`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        },
                        body: JSON.stringify({
                            title: nombre,
                            materia: materia,
                            user_email: email,
                            password: password
                        })
                    }
                );

                if (response.ok) {
                    mensajeDiv.textContent = '✅ ¡Datos guardados correctamente!';
                    mensajeDiv.className = 'mensaje éxito show';
                    form.reset();

                    setTimeout(() => {
                        mensajeDiv.classList.remove('show');
                    }, 3000);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    const errorMsg = errorData.message || errorData.error || `Error ${response.status}`;
                    throw new Error(errorMsg);
                }

            } catch (error) {
                mensajeDiv.textContent = '❌ Error: ' + error.message;
                mensajeDiv.className = 'mensaje error show';
                console.error(error);
            }
        });
    </script>

</body>
</html>
