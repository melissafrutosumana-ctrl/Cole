<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Docentes - CTP Matapalo</title>
    <link rel="stylesheet" href="stylo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --verde-base: #0a4c23;
            --verde-claro: #1a6b3a;
            --crema: #f5f1e8;
            --fondo: #ebe5d9;
            --blanco: #ffffff;
            --texto-cuerpo: #333333;
            --texto-gris: #5a5a5a;
            --borde: #d4ccc0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background:
                radial-gradient(circle at top right, rgba(26, 107, 58, 0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(10, 76, 35, 0.08), transparent 38%),
                var(--fondo);
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto-cuerpo);
        }

        img, video {
            max-width: 100%;
            height: auto;
        }

        .header {
            background-color: var(--crema);
            padding: 15px 0;
            color: var(--verde-base);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--verde-base);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-logos-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-mep {
            height: 50px;
            object-fit: contain;
        }

        .divider {
            width: 1px;
            height: 40px;
            background-color: rgba(10, 76, 35, 0.3);
        }

        .logo-gobierno {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 1.2;
            color: var(--verde-base);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-escudo {
            height: 85px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .main-title-bar {
            background: var(--blanco);
            border-bottom: 3px solid var(--verde-base);
            padding: 22px 0;
            text-align: center;
        }

        .main-title-bar h1 {
            margin: 0;
            color: var(--verde-base);
            font-size: 1.65rem;
            font-weight: 800;
        }

        .main-title-bar p {
            margin-top: 8px;
            color: var(--texto-gris);
            font-size: 0.95rem;
        }

        .content-wrap {
            padding: 35px 20px 45px;
        }

        .form-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 30px;
            background: var(--blanco);
            border-radius: 12px;
            box-shadow: 0 14px 30px rgba(10, 76, 35, 0.12);
            border: 1px solid var(--borde);
        }

        .form-container h1 {
            text-align: center;
            color: var(--verde-base);
            margin-bottom: 24px;
            font-size: 1.45rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        label {
            color: var(--verde-base);
            font-weight: 700;
            text-align: left;
            margin-bottom: 6px;
            display: block;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--borde);
            border-radius: 6px;
            font-size: 14px;
            background: var(--blanco);
            color: var(--texto-cuerpo);
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input::placeholder, textarea::placeholder {
            color: #999;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--verde-claro);
            box-shadow: 0 0 0 3px rgba(10, 76, 35, 0.1);
        }

        button {
            padding: 12px;
            background: linear-gradient(135deg, var(--verde-base) 0%, var(--verde-claro) 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(10, 76, 35, 0.28);
        }

        .mensaje {
            padding: 14px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: 700;
            text-align: center;
        }

        .éxito {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid var(--verde-base);
        }

        .error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #d9534f;
        }

        .mensaje.show {
            display: block;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 12px;
            padding: 12px;
            background: var(--blanco);
            color: var(--verde-base);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 700;
            transition: 0.3s;
            border: 1px solid var(--verde-base);
        }

        a:hover {
            background: var(--verde-base);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 700px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .logo-gobierno {
                font-size: 0.7rem;
                text-align: center;
            }
            .header-logos-left {
                flex-direction: column;
                justify-content: center;
            }
            .divider {
                display: none;
            }
            .tabla-container, .overflow-auto, .tabla-scroll {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                display: block;
            }
            .tabla-container table, .overflow-auto table, .tabla-scroll table {
                white-space: nowrap;
                min-width: max-content;
            }
            .header-container {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .logo-mep {
                height: 40px;
            }

            .logo-escudo {
                height: 60px;
            }

            .main-title-bar h1 {
                font-size: 1.3rem;
            }

            .main-title-bar p {
                padding: 0 14px;
            }

            .content-wrap {
                padding: 24px 14px 36px;
            }

            .form-container {
                padding: 22px 16px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-container">
            <div class="header-logos-left">
                <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
                <div class="divider"></div>
                <div class="logo-gobierno">
                    <strong>Colegio Técnico Profesional</strong><br>
                    de Matapalo
                </div>
            </div>

            <div class="nav-right">
                <a href="index.html" title="Inicio">
                    <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
                </a>
            </div>
        </div>
    </header>

    <section class="main-title-bar">
        <h1>Registro de Docentes</h1>
        <p>Complete sus datos institucionales para crear su acceso al sistema.</p>
    </section>

    <div class="content-wrap">

    <div class="form-container">
        <h1><i class="fas fa-user-check"></i> Registro de Docentes</h1>

        <form id="miFormulario">

            <div style="margin-bottom: 15px;">
                <label for="nombre"><i class="fas fa-user"></i> Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="email"><i class="fas fa-envelope"></i> Correo Institucional:</label>
                <input type="email" id="email" name="email" required placeholder="correo@mep.go.cr">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="password"><i class="fas fa-key"></i> Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Crea una contraseña segura">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="materia"><i class="fas fa-book"></i> Materia/Especialidad:</label>
                <textarea id="materia" name="materia" rows="3" placeholder="Describe tu materia o especialidad..."></textarea>
            </div>

            <button type="submit"><i class="fas fa-check"></i> REGISTRARSE</button>

            <a href="registrarme.html"><i class="fas fa-arrow-left"></i> Volver al Login</a>

        </form>

        <div class="mensaje" id="mensaje"></div>
    </div>

    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'TU_API_KEY_AQUI';

        const form = document.getElementById('miFormulario');
        const mensajeDiv = document.getElementById('mensaje');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const materia = document.getElementById('materia').value;

            /* 🔥 VALIDACIÓN CORREO MEP */
            if (!email.endsWith("@mep.go.cr")) {
                mensajeDiv.textContent = '❌ Solo se permiten correos institucionales (@mep.go.cr)';
                mensajeDiv.className = 'mensaje error show';
                return;
            }

            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/todos`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        },
                        body: JSON.stringify({
                            title: nombre,
                            materia: materia,
                            user_email: email,
                            password: password
                        })
                    }
                );

                if (response.ok) {
                    mensajeDiv.textContent = '✅ ¡Datos guardados correctamente!';
                    mensajeDiv.className = 'mensaje éxito show';
                    form.reset();

                    setTimeout(() => {
                        mensajeDiv.classList.remove('show');
                    }, 3000);
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    const errorMsg = errorData.message || errorData.error || `Error ${response.status}`;
                    throw new Error(errorMsg);
                }

            } catch (error) {
                mensajeDiv.textContent = '❌ Error: ' + error.message;
                mensajeDiv.className = 'mensaje error show';
                console.error(error);
            }
        });
    </script>

</body>
</html>
