<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería STEAM - CTP Matapalo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --verde-base: #0a4c23;
            --verde-suave: #ebe5d9;
            --fondo-sitio: #ebe5d9;
            --blanco: #ffffff;
            --texto-titulo: #0a4c23;
            --texto-cuerpo: #333333;
            --texto-gris: #5a5a5a;
            --borde: #d4ccc0;
            --sombra-card: 0 12px 30px rgba(10, 76, 35, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(26, 107, 58, 0.12), transparent 42%),
                radial-gradient(circle at bottom left, rgba(10, 76, 35, 0.08), transparent 40%),
                var(--fondo-sitio);
            color: var(--texto-cuerpo);
            line-height: 1.6;
            min-height: 100vh;
        }

        img, video {
            max-width: 100%;
            height: auto;
        }

        /* HEADER CREMA - MEJOR VISIBILIDAD DE LOGOS */
        .header {
            background-color: #f5f1e8;
            padding: 15px 0;
            color: #0a4c23;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--verde-base);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-logos-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* LOGO MEP */
        .logo-mep {
            height: 50px;
            object-fit: contain;
        }

        .divider {
            width: 1px;
            height: 40px;
            background-color: rgba(10, 76, 35, 0.3);
        }

        .logo-gobierno {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 1.2;
            color: #0a4c23;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-escudo {
            height: 85px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .btn-login {
            padding: 9px 20px;
            border-radius: 4px;
            background-color: var(--verde-base);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid var(--verde-base);
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: white;
            color: var(--verde-base);
        }

        /* BARRA DE TÍTULO */
        .main-title-bar {
            background: white;
            padding: 25px 0;
            text-align: center;
            border-bottom: 3px solid var(--verde-base);
        }

        .main-title-bar h1 {
            margin: 0;
            color: var(--texto-titulo);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .main-title-bar p {
            margin-top: 8px;
            color: var(--texto-gris);
            font-size: 0.95rem;
        }

        .galeria-wrap {
            max-width: 1260px;
            margin: 30px auto 40px;
            padding: 0 20px;
        }

        /* GALERÍA */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
        }

        /* TARJETAS */
        .item {
            background: var(--blanco);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: var(--sombra-card);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            border: 1px solid var(--borde);
            position: relative;
        }

        .item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 28px rgba(10, 76, 35, 0.2);
            border-color: rgba(10, 76, 35, 0.35);
        }

        .item::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 65%, rgba(10, 76, 35, 0.16));
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }

        .item:hover::after {
            opacity: 1;
        }

        /* IMÁGENES Y VIDEOS */
        .item img,
        .item video {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.35s ease;
        }

        .item:hover img,
        .item:hover video {
            transform: scale(1.05);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .logo-gobierno {
                font-size: 0.7rem;
                text-align: center;
            }
            .header-logos-left {
                flex-direction: column;
                justify-content: center;
            }
            .divider {
                display: none;
            }
            .tabla-container, .overflow-auto, .tabla-scroll {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                display: block;
            }
            .tabla-container table, .overflow-auto table, .tabla-scroll table {
                white-space: nowrap;
                min-width: max-content;
            }
            .main-title-bar h1 {
                font-size: 1.5rem;
            }

            .galeria {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .item img,
            .item video {
                height: 180px;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                flex-wrap: wrap;
                gap: 10px;
            }

            .nav-right {
                gap: 15px;
            }

            .logo-mep {
                height: 40px;
            }

            .logo-escudo {
                height: 60px;
            }

            .main-title-bar h1 {
                font-size: 1.35rem;
            }

            .main-title-bar p {
                padding: 0 16px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-container">
            <div class="header-logos-left">
                <img src="LOGO_MEP-removebg-preview.png" alt="MEP Costa Rica" class="logo-mep">
                <div class="divider"></div>
                <div class="logo-gobierno">
                    <strong>Colegio Técnico Profesional</strong><br>de Matapalo
                </div>
            </div>
            <div class="nav-right">
                <a href="index.html" title="Inicio">
                    <img src="escudo sin fondo.png" alt="Escudo CTP" class="logo-escudo">
                </a>
                <a href="registrarme.html" class="btn-login">Acceso Personal</a>
            </div>
        </div>
    </div>

    <!-- BARRA DE TÍTULO -->
    <div class="main-title-bar">
        <h1><i class="fas fa-images"></i> Galería STEAM</h1>
        <p>Actividades, proyectos y momentos destacados de nuestra comunidad educativa.</p>
    </div>

    <div class="galeria-wrap">
    <div class="galeria">

        <!-- IMÁGENES -->
        <div class="item">
            <img src="1.jpeg" alt="Actividad STEAM 1">
        </div>

        <div class="item">
            <img src="2.jpeg" alt="Actividad STEAM 2">
        </div>

        <div class="item">
            <img src="3.jpeg" alt="Actividad STEAM 3">
        </div>

        <div class="item">
            <img src="4.jpeg" alt="Actividad STEAM 4">
        </div>

        <div class="item">
            <img src="5.jpeg" alt="Actividad STEAM 5">
        </div>

    </div>
    </div>

</body>

</html>
