    <!-- MODAL PARA GALERÍA (LIGHTBOX) -->

    <script>
        // 🎨 GALERÍA CON IMÁGENES LOCALES + SUPABASE
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

        // Cargar imágenes adicionales desde Supabase (si existen)
        async function cargarImagenesSupabaseGaleria() {
            const galeriaDiv = document.querySelector('.galeria');
            
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/imagenes?destino=eq.galeria&select=url,descripcion&order=id.desc`, {
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!res.ok) throw new Error('Error fetching');

                const imagenes = await res.json();
                if (imagenes && imagenes.length > 0) {
                    imagenes.forEach(img => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<img src="${img.url}" alt="${img.descripcion || 'Imagen'}" loading="lazy">`;
                        galeriaDiv.appendChild(div);
                    });
                    console.log(`✅ ${imagenes.length} nuevas imágenes de galería agregadas`);
                    agregarLightbox(); // Recargar lightbox para nuevas imágenes
                }
            } catch (e) {
                console.warn('⚠️ No se pudieron cargar imágenes de Supabase:', e.message);
                // No romper el sitio, solo mostrar advertencia en consola
            }
        }

        // Lightbox para imágenes
        function agregarLightbox() {
            const modal = document.getElementById("imageModal");
            const modalImg = document.getElementById("modalImg");
            const items = document.querySelectorAll(".item img");
            const span = document.getElementsByClassName("close-lightbox")[0];
            
            items.forEach(img => {
                img.addEventListener('click', function() {
                    modal.style.display = "flex";
                    setTimeout(() => modal.classList.add('show'), 10);
                    modalImg.src = this.src;
                });
            });
            
            span.onclick = function() {
                modal.classList.remove('show');
                setTimeout(() => modal.style.display = "none", 300);
            }
            
            modal.onclick = function(e) {
                if (e.target !== modalImg) {
                    modal.classList.remove('show');
                    setTimeout(() => modal.style.display = "none", 300);
                }
            }
        }

        // Inicializar al cargar
        window.addEventListener('DOMContentLoaded', function() {
            agregarLightbox();
            cargarImagenesSupabaseGaleria();
        });
    </script>
