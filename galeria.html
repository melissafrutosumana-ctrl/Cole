<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería STEAM - CTP Matapalo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --verde-base: #0a4c23;
            --verde-suave: #ebe5d9;
            --fondo-sitio: #ebe5d9;
            --blanco: #ffffff;
            --texto-titulo: #0a4c23;
            --texto-cuerpo: #333333;
            --texto-gris: #5a5a5a;
            --borde: #d4ccc0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo-sitio);
            color: var(--texto-cuerpo);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* HEADER CREMA - MEJOR VISIBILIDAD DE LOGOS */
        .header {
            background-color: #f5f1e8;
            padding: 15px 0;
            color: #0a4c23;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--verde-base);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-logos-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* LOGO MEP */
        .logo-mep {
            height: 50px;
            object-fit: contain;
        }

        .divider {
            width: 1px;
            height: 40px;
            background-color: rgba(10, 76, 35, 0.3);
        }

        .logo-gobierno {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 1.2;
            color: #0a4c23;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-escudo {
            height: 85px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .btn-login {
            padding: 9px 20px;
            border-radius: 4px;
            background-color: var(--verde-base);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid var(--verde-base);
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: white;
            color: var(--verde-base);
        }

        /* BARRA DE TÍTULO */
        .main-title-bar {
            background: white;
            padding: 25px 0;
            text-align: center;
            border-bottom: 3px solid var(--verde-base);
        }

        .main-title-bar h1 {
            margin: 0;
            color: var(--texto-titulo);
            font-size: 1.8rem;
            font-weight: 800;
        }

        /* GALERÍA */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* TARJETAS */
        .item {
            background: #f5f1e8;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid #0a4c23;
        }

        .item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(10, 76, 35, 0.3);
        }

        /* IMÁGENES Y VIDEOS */
        .item img,
        .item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-title-bar h1 {
                font-size: 1.5rem;
            }

            .galeria {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .item img,
            .item video {
                height: 150px;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                flex-wrap: wrap;
                gap: 10px;
            }

            .nav-right {
                gap: 15px;
            }

            .logo-mep {
                height: 40px;
            }

            .logo-escudo {
                height: 60px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-container">
            <div class="header-logos-left">
                <img src="steam.png" alt="MEP" class="logo-mep">
                <div class="divider"></div>
                <div class="logo-gobierno">
                    <strong>Ministerio de</strong><br>Educación Pública
                </div>
            </div>
            <div class="nav-right">
                <img src="escudo sin fondo.png" alt="Escudo CTP" class="logo-escudo">
                <a href="registrarme.html" class="btn-login">Ingresar</a>
            </div>
        </div>
    </div>

    <!-- BARRA DE TÍTULO -->
    <div class="main-title-bar">
        <h1><i class="fas fa-images"></i> Galería STEAM</h1>
    </div>

    <div class="galeria">

        <!-- IMÁGENES -->
        <div class="item">
            <img src="1.jpeg" alt="Imagen 1">
        </div>

        <div class="item">
            <img src="2.jpeg" alt="Imagen 2">
        </div>

        <div class="item">
            <img src="3.jpeg" alt="Imagen 3">
        </div>

        <div class="item">
            <img src="4.jpeg" alt="Imagen 4">
        </div>

        <div class="item">
            <img src="5.jpeg" alt="Imagen 5">
        </div>

    </div>

</body>

</html>
