<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Steam</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        
        h1 {
            margin-top: 10px;
        }
        /* LOGO */
        
        img.logo {
            width: 100px;
            margin-top: 10px;
        }
        /* GALERÍA */
        
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        /* TARJETAS */
        
        .item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        
        .item:hover {
            transform: scale(1.05);
        }
        /* IMÁGENES Y VIDEOS */
        
        .item img,
        .item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        /* RESPONSIVE */
        
        @media (max-width: 600px) {
            .item img,
            .item video {
                height: 150px;
            }
        }
    </style>
</head>

<body>

    <img src="steam.png" class="logo">

    <h1>Galería de Imágenes y Videos</h1>

    <div class="galeria">

        <!-- IMÁGENES -->
        <div class="item">
            <img src="1.jpg" alt="Imagen 1">
        </div>

        <div class="item">
            <img src="2.jpg" alt="Imagen 2">
        </div>

        <div class="item">
            <img src="3.jpg" alt="Imagen 3">
        </div>

        <div class="item">
            <img src="4.jpg" alt="Imagen 4">
        </div>

        <!-- VIDEOS -->
        <div class="item">
            <video controls>
                <source src="video1.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>

        <div class="item">
            <video controls>
                <source src="video2.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>

    </div>

</body>

</html>
