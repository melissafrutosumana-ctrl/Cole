<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login Colegio</title>

    <style>
        body {
            background: #6fcf97;
            font-family: Arial;
        }

        .login-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #008CD0;
            color: white;
            border: none;
        }

        .mensaje {
            margin-top: 10px;
            padding: 10px;
            display: none;
        }

        .exito { background: #d4edda; }
        .error { background: #f8d7da; }
        .show { display: block; }
    </style>
</head>

<body>

    <div class="login-container">

        <h2>Iniciar Sesión</h2>

        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">INGRESAR</button>
        </form>

        <div id="mensaje" class="mensaje"></div>

        <div id="datosUsuario" style="display:none;">
            <h3>Bienvenido</h3>
            <p><strong>Nombre:</strong> <span id="mostrarNombre"></span></p>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

        const form = document.getElementById('loginForm');
        const mensaje = document.getElementById('mensaje');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;

            try {

                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&contrasena=eq.${encodeURIComponent(password)}`,
                    {
                        method: 'GET',
                        headers: {
                            apikey: SUPABASE_KEY,
                            Authorization: `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                const data = await response.json();

                if (data.length > 0) {

                    const user = data[0];

                    // Guardar datos
                    localStorage.setItem("usuario", user.usuario);
                    localStorage.setItem("nombre", user.nombre_completo);

                    // Mostrar nombre
                    document.getElementById('mostrarNombre').textContent = user.nombre_completo;
                    document.getElementById('datosUsuario').style.display = "block";

                    mensaje.textContent = "✅ Bienvenido " + user.nombre_completo;
                    mensaje.className = "mensaje exito show";

                    // Redirigir
                    setTimeout(() => {
                        window.location.href = "docentes.html";
                    }, 1500);

                } else {
                    mensaje.textContent = "❌ Usuario o contraseña incorrectos";
                    mensaje.className = "mensaje error show";
                }

            } catch (error) {
                mensaje.textContent = "❌ Error de conexión";
                mensaje.className = "mensaje error show";
                console.error(error);
            }
        });
    </script>

</body>
</html>
