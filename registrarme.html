<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="stylo.css">
    <style>
        .login-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            padding: 12px;
            background: #008CD0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #006a9a;
        }

        .boton-secundario {
            background: #6c757d;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            display: block;
        }

        .boton-secundario:hover {
            background: #5a6268;
        }

        .mensaje {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .éxito {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .mensaje.show {
            display: block;
        }

        .datos-usuario {
            display: none;
            background: #f0f8ff;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            border-left: 4px solid #008CD0;
        }

        .datos-usuario.show {
            display: block;
        }

        .datos-usuario p {
            margin: 10px 0;
            font-size: 14px;
        }

        .datos-usuario strong {
            color: #008CD0;
        }
    </style>
</head>

<body bgcolor="#008CD0">
    <center><img src="26.jpg">
        <!--COMENTARIO bradley le deje un codigo centrado no lo mueva-->
    </center>
    <center>
        <h1>Iniciar Sesión</h1>
    </center>

    <div class="login-container">
        <form id="loginForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required placeholder="Tu contraseña">

            <button type="submit">INGRESAR</button>
            <a href="index.html" class="boton-secundario">Volver a Registro</a>
        </form>
        <div class="mensaje" id="mensaje"></div>
    </div>

    <div class="datos-usuario" id="datosUsuario">
        <h3>Datos del Usuario</h3>
        <p><strong>Nombre:</strong> <span id="mostrarNombre"></span></p>
        <p><strong>Email:</strong> <span id="mostrarEmail"></span></p>
        <p><strong>Materia:</strong> <span id="mostrarMateria"></span></p>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

        const form = document.getElementById('loginForm');
        const mensajeDiv = document.getElementById('mensaje');
        const datosUsuarioDiv = document.getElementById('datosUsuario');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Buscar usuario en Supabase con email y contraseña
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/todos?user_email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(password)}`,
                    {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                const datos = await response.json();

                if (datos && datos.length > 0) {
                    const usuario = datos[0];
                    
                    // Mostrar datos del usuario
                    document.getElementById('mostrarNombre').textContent = usuario.title || 'N/A';
                    document.getElementById('mostrarEmail').textContent = usuario.user_email || 'N/A';
                    document.getElementById('mostrarMateria').textContent = usuario.materia || 'N/A';
                    
                    datosUsuarioDiv.classList.add('show');
                    
                    mensajeDiv.textContent = '✅ ¡Sesión iniciada correctamente!';
                    mensajeDiv.className = 'mensaje éxito show';
                    form.reset();
                    
                    setTimeout(() => {
                        mensajeDiv.classList.remove('show');
                    }, 3000);
                } else {
                    throw new Error('Email o contraseña incorrectos');
                }
            } catch (error) {
                mensajeDiv.textContent = '❌ Error: ' + error.message;
                mensajeDiv.className = 'mensaje error show';
                console.error('Error:', error);
                datosUsuarioDiv.classList.remove('show');
            }
        });
    </script>
</body>

</html>
