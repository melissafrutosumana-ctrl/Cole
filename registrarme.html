<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Colegio</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { background: linear-gradient(135deg, #0a4c23 0%, #1a6b3a 100%); font-family:Arial; min-height: 100vh; margin: 0; padding: 20px; }
.login-container {
    max-width:400px;
    margin:60px auto;
    padding:30px;
    background: #f5f1e8;
    border-radius:10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    border: 2px solid #0a4c23;
}

.login-container h2 {
    color: #0a4c23;
    text-align: center;
    margin-bottom: 30px;
}

input, button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius: 6px;
}

input {
    background: white;
    border: 1px solid #d4ccc0;
    color: #333;
    font-size: 14px;
    box-sizing: border-box;
}

input::placeholder {
    color: #999;
}

button {
    background: #0a4c23;
    color:white;
    border:none;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1a6b3a;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(10, 76, 35, 0.4);
}

.mensaje { margin-top:15px; padding:15px; display:none; border-radius: 6px; text-align: center; font-weight: bold; }
.exito { background: #e8f5e9; color: #2e7d32; border: 1px solid #0a4c23; }
.error { background: #ffebee; color: #c62828; border: 1px solid #d9534f; }
.show { display:block; }
</style>
</head>

<body>

<div class="login-container">

<h2><i class="fas fa-lock"></i> Iniciar Sesión</h2>

<form id="loginForm">
<div style="position: relative; margin-bottom: 15px;">
  <i class="fas fa-user" style="position: absolute; left: 12px; top: 12px; color: #0a4c23;"></i>
  <input type="text" id="usuario" placeholder=" Usuario" style="padding-left: 40px;" required>
</div>
<div style="position: relative; margin-bottom: 15px;">
  <i class="fas fa-key" style="position: absolute; left: 12px; top: 12px; color: #0a4c23;"></i>
  <input type="password" id="password" placeholder=" Contraseña" style="padding-left: 40px;" required>
</div>
<button type="submit">INGRESAR</button>
</form>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';

const form = document.getElementById('loginForm');
const mensaje = document.getElementById('mensaje');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;

    try {

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&contrasena=eq.${encodeURIComponent(password)}`,
            {
                method: 'GET',
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        if (data.length > 0) {

            const user = data[0];

            // 🔐 GUARDAR SESIÓN
            localStorage.setItem("usuario", user.usuario);
            localStorage.setItem("nombre", user.nombre_completo);
            localStorage.setItem("rol", user.rol);

            mensaje.textContent = "✅ Bienvenido " + user.nombre_completo;
            mensaje.className = "mensaje exito show";

            setTimeout(() => {
                window.location.href = "docentes.html";
            }, 1500);

        } else {
            mensaje.textContent = "❌ Usuario o contraseña incorrectos";
            mensaje.className = "mensaje error show";
        }

    } catch (error) {
        mensaje.textContent = "❌ Error de conexión";
        mensaje.className = "mensaje error show";
        console.error(error);
    }
});

</script>

</body>
</html>
