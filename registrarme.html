<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CTP Matapalo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


    <link rel="stylesheet" href="css/stylo.css">
</head>

<body class="page-registrarme">

<!-- HEADER IGUAL AL INDEX -->
<header class="header">
    <div class="header-container">
        <div class="header-logos-left">
            <img src="img/LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
            <div class="divider"></div>
            <div class="logo-gobierno">
                <strong>Colegio Técnico Profesional</strong><br>
                de Matapalo
            </div>
        </div>

        <div class="nav-right">
            <a href="index.html" title="Inicio">
                <img src="img/escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
            </a>
        </div>
    </div>
</header>

<section class="main-title-bar">
    <h1>Acceso del Personal</h1>
    <p>Ingrese con su usuario institucional para administrar ausencias y comunicados.</p>
</section>

<div class="login-page">

    <div class="login-container">
        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="usuario" placeholder="Usuario" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>

            <div class="btn-container">
                <button type="submit" id="btnIngresar"><i class="fas fa-sign-in-alt"></i> INGRESAR</button>
            </div>
        </form>

        <div id="mensaje" class="mensaje"></div>
    </div>
</div>

<script>

const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';

const form = document.getElementById('loginForm');
const mensaje = document.getElementById('mensaje');
const btnIngresar = document.getElementById('btnIngresar');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;

    btnIngresar.disabled = true;
    btnIngresar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CARGANDO...';

    try {

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&contrasena=eq.${encodeURIComponent(password)}`,
            {
                method: 'GET',
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        if (data.length > 0) {

            const user = data[0];

            // 🔐 GUARDAR SESIÓN
            localStorage.setItem("usuario", user.usuario);
            localStorage.setItem("nombre", user.nombre_completo);
            localStorage.setItem("rol", user.rol);

            mensaje.innerHTML = "✅ Bienvenido " + user.nombre_completo;
            mensaje.className = "mensaje exito show";

            setTimeout(() => {
                globalThis.location.href = "docentes.html";
            }, 1500);

        } else {
            mensaje.innerHTML = "❌ Usuario o contraseña incorrectos";
            mensaje.className = "mensaje error show";
        }

    } catch (error) {
        mensaje.innerHTML = "❌ Error de conexión";
        mensaje.className = "mensaje error show";
        console.error(error);
    } finally {
        btnIngresar.disabled = false;
        btnIngresar.innerHTML = '<i class="fas fa-sign-in-alt"></i> INGRESAR';
    }
});

</script>

</body>
</html>
