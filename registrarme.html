<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <style>
        .login-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 12px;
            background: #008CD0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .mensaje {
            padding: 10px;
            margin-top: 10px;
            display: none;
        }

        .exito {
            background: #d4edda;
        }

        .error {
            background: #f8d7da;
        }

        .show {
            display: block;
        }
    </style>
</head>

<body bgcolor="#6fcf97">

    <center><h1>Iniciar Sesión</h1></center>

    <div class="login-container">
        <form id="loginForm">

            <label>Usuario:</label>
            <input type="text" id="usuario" required placeholder="Ingrese su usuario">

            <label>Contraseña:</label>
            <input type="password" id="password" required placeholder="Ingrese su contraseña">

            <button type="submit">INGRESAR</button>

        </form>

        <div id="mensaje" class="mensaje"></div>
    </div>

    <div id="datosUsuario" style="display:none;">
        <h3>Bienvenido</h3>
        <p><strong>Nombre:</strong> <span id="mostrarNombre"></span></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'TU_API_KEY_AQUI'; // deja la tuya

        const form = document.getElementById('loginForm');
        const mensaje = document.getElementById('mensaje');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;

            try {

                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${usuario}&contrasena=eq.${password}`,
                    {
                        method: 'GET',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                const data = await response.json();

                if (data.length > 0) {

                    const user = data[0];

                    // guardar en localStorage
                    localStorage.setItem("usuario", user.usuario);
                    localStorage.setItem("nombre", user.nombre_completo);

                    // mostrar datos
                    document.getElementById('mostrarNombre').textContent = user.nombre_completo;
                    document.getElementById('datosUsuario').style.display = "block";

                    mensaje.textContent = "✅ Bienvenido " + user.nombre_completo;
                    mensaje.className = "mensaje exito show";

                    // redirigir
                    setTimeout(() => {
                        window.location.href = "docentes.html";
                    }, 1500);

                } else {

                    mensaje.textContent = "❌ Usuario o contraseña incorrectos";
                    mensaje.className = "mensaje error show";
                }

            } catch (error) {

                mensaje.textContent = "❌ Error de conexión";
                mensaje.className = "mensaje error show";
                console.error(error);
            }
        });
    </script>

</body>
</html>
