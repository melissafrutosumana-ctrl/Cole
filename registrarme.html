<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CTP Matapalo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --verde-base: #0a4c23;
    --verde-claro: #1a6b3a;
    --crema: #f5f1e8;
    --fondo: #ebe5d9;
    --blanco: #ffffff;
    --texto-cuerpo: #333333;
    --texto-gris: #5a5a5a;
    --borde: #d4ccc0;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow-x: hidden;
    background:
        radial-gradient(circle at top right, rgba(26, 107, 58, 0.1), transparent 40%),
        radial-gradient(circle at bottom left, rgba(10, 76, 35, 0.08), transparent 38%),
        #ebe5d9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    color: var(--texto-cuerpo);
}

.header {
    background-color: var(--crema);
    padding: 15px 0;
    color: var(--verde-base);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-bottom: 3px solid var(--verde-base);
}

.header-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

.header-logos-left {
    display: flex;
    align-items: center;
    gap: 20px;
}

.logo-mep {
    height: 50px;
    object-fit: contain;
}

.divider {
    width: 1px;
    height: 40px;
    background-color: rgba(10, 76, 35, 0.3);
}

.logo-gobierno {
    text-align: left;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    line-height: 1.2;
    color: var(--verde-base);
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 30px;
}

.logo-escudo {
    height: 85px;
    filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
}

.login-page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 190px);
    padding: 35px 20px 45px;
}

.main-title-bar {
    background: var(--blanco);
    border-bottom: 3px solid var(--verde-base);
    padding: 22px 0;
    text-align: center;
}

.main-title-bar h1 {
    margin: 0;
    color: var(--verde-base);
    font-size: 1.65rem;
    font-weight: 800;
}

.main-title-bar p {
    margin-top: 8px;
    color: var(--texto-gris);
    font-size: 0.95rem;
}

.login-wrapper {
    width: 100%;
    max-width: 420px;
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
    color: #0a4c23;
}

.logo-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
    align-items: center;
}

.logo-container img {
    height: 70px;
    filter: brightness(0) invert(1);
}

.login-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #0a4c23;
    margin-bottom: 8px;
}

.login-header p {
    font-size: 14px;
    color: #666;
    font-weight: 300;
}

.login-container {
    background: var(--blanco);
    border-radius: 12px;
    box-shadow: 0 16px 32px rgba(10, 76, 35, 0.14);
    border: 1px solid var(--borde);
    padding: 40px;
    animation: slideUp 0.5s ease-out;
    width: 100%;
    max-width: 440px;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.form-group {
    margin-bottom: 20px;
    position: relative;
}

.form-group i {
    position: absolute;
    left: 14px;
    top: 14px;
    color: var(--verde-base);
    font-size: 18px;
    z-index: 1;
}

input {
    width: 100%;
    padding: 12px 12px 12px 45px;
    border: 1px solid var(--borde);
    border-radius: 8px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: var(--blanco);
    color: #333;
}

input::placeholder {
    color: #999;
}

input:focus {
    outline: none;
    border-color: var(--verde-claro);
    background: var(--blanco);
    box-shadow: 0 0 0 3px rgba(10, 76, 35, 0.1);
}

.btn-container {
    display: flex;
    gap: 12px;
    margin-top: 30px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--verde-base) 0%, var(--verde-claro) 100%);
    color: white;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(10, 76, 35, 0.3);
}

button:active {
    transform: translateY(0);
}

.mensaje {
    margin-top: 15px;
    padding: 12px 15px;
    display: none;
    border-radius: 8px;
    text-align: center;
    font-weight: 500;
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.exito {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #0a4c23;
}

.error {
    background: #ffebee;
    color: #c62828;
    border: 1px solid #d9534f;
}

.show {
    display: block;
}

@media (max-width: 600px) {
            .logo-gobierno {
                font-size: 0.7rem;
                text-align: center;
            }
            .header-logos-left {
                flex-direction: column;
                justify-content: center;
            }
            .divider {
                display: none;
            }
            .tabla-container, .overflow-auto, .tabla-scroll {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                display: block;
            }
            .tabla-container table, .overflow-auto table, .tabla-scroll table {
                white-space: nowrap;
                min-width: max-content;
            }
    .header-container {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    .nav-right {
        gap: 12px;
    }

    .logo-mep {
        height: 40px;
    }

    .logo-escudo {
        height: 60px;
    }

    .main-title-bar h1 {
        font-size: 1.3rem;
    }

    .main-title-bar p {
        padding: 0 14px;
    }

    .login-container {
        padding: 30px 20px;
    }

    .login-header h1 {
        font-size: 24px;
    }

    .btn-container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- HEADER IGUAL AL INDEX -->
<header class="header">
    <div class="header-container">
        <div class="header-logos-left">
            <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
            <div class="divider"></div>
            <div class="logo-gobierno">
                <strong>Colegio Técnico Profesional</strong><br>
                de Matapalo
            </div>
        </div>

        <div class="nav-right">
            <a href="index.html" title="Inicio">
                <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
            </a>
        </div>
    </div>
</header>

<section class="main-title-bar">
    <h1>Acceso del Personal</h1>
    <p>Ingrese con su usuario institucional para administrar ausencias y comunicados.</p>
</section>

<div class="login-page">

    <div class="login-container">
        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="usuario" placeholder="Usuario" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>

            <div class="btn-container">
                <button type="submit"><i class="fas fa-sign-in-alt"></i> INGRESAR</button>
            </div>
        </form>

        <div id="mensaje" class="mensaje"></div>
    </div>
</div>

<script>

const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';

const form = document.getElementById('loginForm');
const mensaje = document.getElementById('mensaje');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;

    try {

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&contrasena=eq.${encodeURIComponent(password)}`,
            {
                method: 'GET',
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        if (data.length > 0) {

            const user = data[0];

            // 🔐 GUARDAR SESIÓN
            localStorage.setItem("usuario", user.usuario);
            localStorage.setItem("nombre", user.nombre_completo);
            localStorage.setItem("rol", user.rol);

            mensaje.textContent = "✅ Bienvenido " + user.nombre_completo;
            mensaje.className = "mensaje exito show";

            setTimeout(() => {
                globalThis.location.href = "docentes.html";
            }, 1500);

        } else {
            mensaje.textContent = "❌ Usuario o contraseña incorrectos";
            mensaje.className = "mensaje error show";
        }

    } catch (error) {
        mensaje.textContent = "❌ Error de conexión";
        mensaje.className = "mensaje error show";
        console.error(error);
    }
});

</script>

</body>
</html>
