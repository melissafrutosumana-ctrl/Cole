<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - CTP Matapalo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0a4c23 0%, #1a6b3a 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-wrapper {
    width: 100%;
    max-width: 420px;
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
    color: white;
}

.logo-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
    align-items: center;
}

.logo-container img {
    height: 70px;
    filter: brightness(0) invert(1);
}

.login-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
}

.login-header p {
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    font-weight: 300;
}

.login-container {
    background: white;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    padding: 40px;
    animation: slideUp 0.5s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.form-group {
    margin-bottom: 20px;
    position: relative;
}

.form-group i {
    position: absolute;
    left: 14px;
    top: 14px;
    color: #0a4c23;
    font-size: 18px;
    z-index: 1;
}

input {
    width: 100%;
    padding: 12px 12px 12px 45px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    transition: all 0.3s ease;
    background: #f8f8f8;
    color: #333;
}

input::placeholder {
    color: #999;
}

input:focus {
    outline: none;
    border-color: #0a4c23;
    background: white;
    box-shadow: 0 0 0 3px rgba(10, 76, 35, 0.1);
}

.btn-container {
    display: flex;
    gap: 12px;
    margin-top: 30px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #0a4c23 0%, #1a6b3a 100%);
    color: white;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(10, 76, 35, 0.3);
}

button:active {
    transform: translateY(0);
}

.mensaje {
    margin-top: 15px;
    padding: 12px 15px;
    display: none;
    border-radius: 8px;
    text-align: center;
    font-weight: 500;
    animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.exito {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #0a4c23;
}

.error {
    background: #ffebee;
    color: #c62828;
    border: 1px solid #d9534f;
}

.show {
    display: block;
}

@media (max-width: 600px) {
    .login-container {
        padding: 30px 20px;
    }

    .login-header h1 {
        font-size: 24px;
    }

    .btn-container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-header">
        <div class="logo-container">
            <img src="LOGO MEP.png" alt="Logo MEP">
            <img src="escudo sin fondo.png" alt="Escudo CTP">
        </div>
        <h1><i class="fas fa-lock"></i> Iniciar Sesión</h1>
        <p>Colegio Técnico Profesional de Matapalo</p>
    </div>

    <div class="login-container">
        <form id="loginForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="usuario" placeholder="Usuario" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>

            <div class="btn-container">
                <button type="submit"><i class="fas fa-sign-in-alt"></i> INGRESAR</button>
            </div>
        </form>

        <div id="mensaje" class="mensaje"></div>
    </div>
</div>

<script>

const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';

const form = document.getElementById('loginForm');
const mensaje = document.getElementById('mensaje');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;

    try {

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/usuarios?usuario=eq.${encodeURIComponent(usuario)}&contrasena=eq.${encodeURIComponent(password)}`,
            {
                method: 'GET',
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        const data = await response.json();

        if (data.length > 0) {

            const user = data[0];

            // 🔐 GUARDAR SESIÓN
            localStorage.setItem("usuario", user.usuario);
            localStorage.setItem("nombre", user.nombre_completo);
            localStorage.setItem("rol", user.rol);

            mensaje.textContent = "✅ Bienvenido " + user.nombre_completo;
            mensaje.className = "mensaje exito show";

            setTimeout(() => {
                window.location.href = "docentes.html";
            }, 1500);

        } else {
            mensaje.textContent = "❌ Usuario o contraseña incorrectos";
            mensaje.className = "mensaje error show";
        }

    } catch (error) {
        mensaje.textContent = "❌ Error de conexión";
        mensaje.className = "mensaje error show";
        console.error(error);
    }
});

</script>

</body>
</html>
