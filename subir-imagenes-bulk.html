<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Imágenes en Lote - CTP Matapalo</title>
    <link rel="icon" type="image/png" href="img/logo_colegio_nuevo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ebe5d9 0%, #f0ebe1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #0a4c23;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #0a4c23;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1em;
            border-left: 4px solid #0a4c23;
            padding-left: 10px;
        }

        .imagenes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f7f4;
        }

        .img-item {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.75em;
            color: #666;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .img-item.uploading {
            background: #fff3cd;
            border-color: #ffc107;
        }

        .img-item.done {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .img-item.error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .btn-upload {
            background: #0a4c23;
            color: white;
        }

        .btn-upload:hover {
            background: #083d1a;
            box-shadow: 0 4px 12px rgba(10, 76, 35, 0.3);
        }

        .btn-upload:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #d4a256;
            color: white;
        }

        .btn-reset:hover {
            background: #b8861f;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0a4c23, #1a6b3a);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 8px;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .counter {
            text-align: center;
            font-size: 1.3em;
            color: #0a4c23;
            font-weight: 700;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-cloud-upload-alt"></i> Subir Imágenes</h1>
        <p class="subtitle">Sube todas las imágenes de una vez a Supabase</p>

        <!-- CARRUSEL -->
        <div class="section">
            <div class="section-title"><i class="fas fa-images"></i> Carrusel (12 imágenes)</div>
            <div class="imagenes-list" id="carruselList"></div>
        </div>

        <!-- GALERÍA -->
        <div class="section">
            <div class="section-title"><i class="fas fa-th"></i> Galería (11 imágenes)</div>
            <div class="imagenes-list" id="galeriaList"></div>
        </div>

        <!-- BOTONES -->
        <div class="btn-group">
            <button class="btn-upload" id="btnUpload"><i class="fas fa-upload"></i> Subir Todo</button>
            <button class="btn-reset" id="btnReset"><i class="fas fa-redo"></i> Reiniciar</button>
        </div>

        <!-- BARRA DE PROGRESO -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0/23 imágenes subidas</div>

        <!-- STATUS -->
        <div class="status" id="status"></div>
    </div>

    <script>
        const SUPABASE_CONFIG = {
            url: 'https://etdcmuikvtnqfcnlvodh.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A'
        };

        const imagenes = {
            carrusel: [
                { archivo: 'info.jpeg', destino: 'carrusel' },
                { archivo: 'comidas.png', destino: 'carrusel' },
                { archivo: 'huevos1.jpeg', destino: 'carrusel' },
                { archivo: 'ciencia.jpeg', destino: 'carrusel' },
                { archivo: 'cuatro.jpeg', destino: 'carrusel' },
                { archivo: 'lau.jpeg', destino: 'carrusel' },
                { archivo: '23ab.jpeg', destino: 'carrusel' },
                { archivo: '23abb.jpeg', destino: 'carrusel' },
                { archivo: 'QE.png', destino: 'carrusel' },
                { archivo: 'QEE.png', destino: 'carrusel' },
                { archivo: '23abbb.jpeg', destino: 'carrusel' },
                { archivo: 'orienta.jpeg', destino: 'carrusel' }
            ],
            galeria: [
                { archivo: 'steam1.jpeg', destino: 'galeria' },
                { archivo: 'steam2.jpeg', destino: 'galeria' },
                { archivo: 'steam3.jpeg', destino: 'galeria' },
                { archivo: 'steam4.jpeg', destino: 'galeria' },
                { archivo: 'steam5.jpeg', destino: 'galeria' },
                { archivo: 'steam6.jpeg', destino: 'galeria' },
                { archivo: 'steam7.jpeg', destino: 'galeria' },
                { archivo: 'steam9.jpeg', destino: 'galeria' },
                { archivo: 'steam10.jpeg', destino: 'galeria' },
                { archivo: 'steam11.jpeg', destino: 'galeria' },
                { archivo: 'steam12.jpeg', destino: 'galeria' }
            ]
        };

        let todasLasImagenes = [...imagenes.carrusel, ...imagenes.galeria];
        let itemElements = {};
        let uploadados = 0;

        // Inicializar UI
        function inicializar() {
            const carruselDiv = document.getElementById('carruselList');
            const galeriaDiv = document.getElementById('galeriaList');

            imagenes.carrusel.forEach(img => {
                const div = document.createElement('div');
                div.className = 'img-item';
                div.id = 'img-' + img.archivo;
                div.innerHTML = `<span>${img.archivo}</span>`;
                carruselDiv.appendChild(div);
                itemElements[img.archivo] = div;
            });

            imagenes.galeria.forEach(img => {
                const div = document.createElement('div');
                div.className = 'img-item';
                div.id = 'img-' + img.archivo;
                div.innerHTML = `<span>${img.archivo}</span>`;
                galeriaDiv.appendChild(div);
                itemElements[img.archivo] = div;
            });
        }

        // Mostrar mensaje
        function mostrarStatus(texto, tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status show ' + tipo;
            statusDiv.innerHTML = texto;
        }

        // Actualizar progreso
        function actualizarProgreso(actual, total) {
            const porcentaje = (actual / total) * 100;
            document.getElementById('progressFill').style.width = porcentaje + '%';
            document.getElementById('progressText').textContent = actual + '/' + total + ' imágenes subidas';
        }

        // Subir una imagen
        async function subirImagen(img) {
            try {
                // 1. Descargar archivo desde local
                const response = await fetch(`img/${img.archivo}`);
                if (!response.ok) throw new Error('No se pudo leer archivo local');
                
                const blob = await response.blob();
                const arrayBuffer = await blob.arrayBuffer();

                // 2. Subir a Supabase Storage
                const nombreArchivo = Date.now() + '-' + img.archivo.replace(/\s+/g, '_');
                
                const resUpload = await fetch(`${SUPABASE_CONFIG.url}/storage/v1/object/imagenes/${nombreArchivo}`, {
                    method: 'POST',
                    headers: {
                        apikey: SUPABASE_CONFIG.key,
                        Authorization: `Bearer ${SUPABASE_CONFIG.key}`,
                        'Content-Type': blob.type || 'image/jpeg'
                    },
                    body: arrayBuffer
                });

                if (!resUpload.ok) throw new Error('Error en Storage: ' + resUpload.status);

                const url = `${SUPABASE_CONFIG.url}/storage/v1/object/public/imagenes/${nombreArchivo}`;

                // 3. Guardar en BD
                const resDB = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/imagenes`, {
                    method: 'POST',
                    headers: {
                        apikey: SUPABASE_CONFIG.key,
                        Authorization: `Bearer ${SUPABASE_CONFIG.key}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url,
                        destino: img.destino,
                        descripcion: img.archivo
                    })
                });

                if (!resDB.ok) throw new Error('Error en BD: ' + resDB.status);

                // Marcar como completado
                itemElements[img.archivo].classList.add('done');
                uploadados++;
                actualizarProgreso(uploadados, todasLasImagenes.length);

                return true;
            } catch (error) {
                console.error('Error subiendo ' + img.archivo, error);
                itemElements[img.archivo].classList.add('error');
                return false;
            }
        }

        // Subir todas
        async function subirTodas() {
            const btn = document.getElementById('btnUpload');
            btn.disabled = true;
            uploadados = 0;
            mostrarStatus('⏳ Subiendo imágenes...', 'info');

            // Limpiar estados anteriores
            Object.values(itemElements).forEach(el => {
                el.classList.remove('done', 'error', 'uploading');
            });

            for (let img of todasLasImagenes) {
                itemElements[img.archivo].classList.add('uploading');
                await subirImagen(img);
                await new Promise(resolve => setTimeout(resolve, 500)); // Pequeña pausa entre uploads
            }

            btn.disabled = false;

            if (uploadados === todasLasImagenes.length) {
                mostrarStatus('✅ ¡Todas las imágenes se subieron correctamente!', 'success');
            } else {
                mostrarStatus('⚠️ Se subieron ' + uploadados + ' de ' + todasLasImagenes.length + ' imágenes', 'error');
            }
        }

        // Reiniciar
        function reiniciar() {
            uploadados = 0;
            Object.values(itemElements).forEach(el => {
                el.classList.remove('done', 'error', 'uploading');
            });
            actualizarProgreso(0, todasLasImagenes.length);
            document.getElementById('status').classList.remove('show');
            document.getElementById('btnUpload').disabled = false;
        }

        // Event listeners
        document.getElementById('btnUpload').addEventListener('click', subirTodas);
        document.getElementById('btnReset').addEventListener('click', reiniciar);

        // Inicializar
        inicializar();
    </script>
</body>
</html>
