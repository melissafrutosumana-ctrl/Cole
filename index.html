<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    text-align: center;
    padding: 20px;
    color: white;
    position: relative;
}

/* LOGOS */
.logo-mep { width: 260px; }
.logo-escudo { width: 90px; }

/* BOTONES */
.right {
    position: absolute;
    right: 20px;
    top: 20px;
}

.btn {
    padding: 10px 15px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    margin-left: 10px;
}

.btn-registro { background: #16a085; }
.btn-login { background: #f39c12; }

/* CONTENIDO */
.seccion-blanca { padding: 40px; }

.contenedor {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
}

/* STEAM */
.steam { width: 300px; text-align: center; }
.steam img { width: 180px; }

/* CARRUSEL */
.carousel-container { width: 500px; }
.carousel-wrapper { position: relative; }

.carousel {
    overflow: hidden;
    border-radius: 15px;
}

.slides {
    display: flex;
    transition: transform 0.6s ease;
}

.slides img {
    width: 100%;
    height: 350px;
    object-fit: contain;
}

/* BOTONES */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* TABLA */
.tabla-ausencias { margin-top: 50px; }

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #27ae60;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .contenedor { flex-direction: column; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="right">
    <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
    <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
</div>

<img src="LOGO MEP.png" class="logo-mep">
<img src="escudo sin fondo.png" class="logo-escudo">

<h1>Colegio Técnico Profesional de Matapalo</h1>

</div>

<!-- CONTENIDO -->
<div class="seccion-blanca">

<div class="contenedor">

<div class="steam">
<a href="galeria.html"><img src="steam.png"></a>
<p>
Conservación y Promoción de la Reserva Ecológica Institucional como estrategia 
para la Educación Ambiental desde un enfoque STEAM
</p>
</div>

<div class="carousel-container">

<h2 style="text-align:center;">Anuncios del Colegio</h2>

<div class="carousel-wrapper">

<button class="nav-btn prev" onclick="mover(-1)">❮</button>
<button class="nav-btn next" onclick="mover(1)">❯</button>

<div class="carousel">
    <div class="slides" id="slides">
        <img src="1.jpeg">
        <img src="2.jpeg">
        <img src="3.jpeg">
        <img src="4.jpeg">
        <img src="5.jpeg">
    </div>
</div>

</div>

</div>

</div>

<!-- TABLA -->
<div class="tabla-ausencias">
<h2 style="text-align:center;">Ausencias de Docentes</h2>

<table>
<thead>
<tr>
<th>Docente</th>
<th>Día</th>
<th>Motivo</th>
<th>Detalle</th>
</tr>
</thead>
<tbody id="tablaAusencias"></tbody>
</table>
</div>

</div>

<script>

// 🎠 CARRUSEL
let index = 0;
const slides = document.getElementById("slides");

function mover(direccion){
    const total = slides.children.length;
    index += direccion;

    if(index < 0) index = total - 1;
    if(index >= total) index = 0;

    slides.style.transform = `translateX(-${index * 100}%)`;
}

setInterval(() => mover(1), 7000);


// 🔐 SUPABASE
const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';


// 📊 CARGAR AUSENCIAS (CORREGIDO)
async function cargarAusencias(){

    try {

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/ausencias?select=*&order=fecha.desc`,
            {
                headers: {
                    apikey: SUPABASE_KEY,
                    Authorization: `Bearer ${SUPABASE_KEY}`
                }
            }
        );

        if (!response.ok) {
            const error = await response.text();
            console.error(error);
            document.getElementById("tablaAusencias").innerHTML =
                "<tr><td colspan='4'>Error cargando datos</td></tr>";
            return;
        }

        const datos = await response.json();
        console.log("DATOS:", datos);

        let tabla = document.getElementById("tablaAusencias");

        if(!datos || datos.length === 0){
            tabla.innerHTML = "<tr><td colspan='4'>No hay ausencias registradas</td></tr>";
            return;
        }

        tabla.innerHTML = "";

        datos.forEach(a => {

            let fechaBonita = a.fecha 
                ? new Date(a.fecha).toLocaleDateString("es-CR", {
                    weekday: "long",
                    year: "numeric",
                    month: "long",
                    day: "numeric"
                })
                : "Sin fecha";

            tabla.innerHTML += `
            <tr>
                <td>${a.nombre}</td>
                <td>${fechaBonita}</td>
                <td>${a.razon}</td>
                <td>${a.detalle}</td>
            </tr>`;
        });

    } catch (error) {
        console.error(error);
        document.getElementById("tablaAusencias").innerHTML =
            "<tr><td colspan='4'>Error de conexión</td></tr>";
    }
}

// 🚀 EJECUTAR
cargarAusencias();

</script>

</body>
</html>
