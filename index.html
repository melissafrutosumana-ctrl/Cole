<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTP de Matapalo - Sitio Oficial</title>

<style>
:root {
    --verde-base: #1b5e20;
    --verde-suave: #e8f5e9;
    --fondo-sitio: #f4f7f5;
    --blanco: #ffffff;
    --texto-cuerpo: #333333;
    --borde: #d1d9d1;
}

body {
    margin: 0;
    font-family: Arial;
    background-color: var(--fondo-sitio);
}

/* HEADER */
.header {
    background-color: var(--verde-base);
    padding: 40px 20px;
    text-align: center;
    color: white;
    position: relative;
}

.header-logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

/* 🔥 LOGO MEP CORREGIDO */
.logo-mep { 
    height: 60px;
    background: white;
    padding: 6px;
    border-radius: 6px;
}

/* ESCUDO */
.logo-escudo { 
    height: 95px;
}

/* BOTÓN LOGIN */
.nav-actions {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
}

.btn-login {
    padding: 10px 22px;
    border-radius: 5px;
    border: 2px solid white;
    color: white;
    text-decoration: none;
}

/* CONTENIDO */
.container {
    max-width: 1100px;
    margin: 40px auto;
}

/* TABLA */
.tabla-container {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }

th {
    background: var(--verde-base);
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.badge-motivo {
    background: #e8f5e9;
    padding: 4px 10px;
    border-radius: 4px;
}
</style>
</head>

<body>

<header class="header">

<div class="header-logos">
    <img src="LOGO MEP.png" class="logo-mep">
    <img src="escudo sin fondo.png" class="logo-escudo">
</div>

<h1>Colegio Técnico Profesional de Matapalo</h1>

<div class="nav-actions">
    <a href="registrarme.html" class="btn-login">Acceso Personal</a>
</div>

</header>

<div class="container">

<h2>Reporte de Asistencia Docente</h2>

<div class="tabla-container">
<table>
<thead>
<tr>
<th>Docente</th>
<th>Estado</th>
<th>Motivo</th>
<th>Observaciones</th>
</tr>
</thead>

<tbody id="tablaAusencias">
<tr><td colspan="4">Cargando...</td></tr>
</tbody>

</table>
</div>

</div>

<script>

// 🔐 SUPABASE
const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
const SUPABASE_KEY = 'TU_API_KEY_AQUI';

const headers = {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
};

// 📊 CARGAR AUSENCIAS
async function cargarAusencias(){

    const tabla = document.getElementById("tablaAusencias");

    try {

        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/ausencias?select=*&order=fecha.desc`,
            { headers }
        );

        const datos = await res.json();

        if(!datos || datos.length === 0){
            tabla.innerHTML = "<tr><td colspan='4'>No hay datos</td></tr>";
            return;
        }

        tabla.innerHTML = "";

        datos.forEach(a=>{
            tabla.innerHTML += `
            <tr>
                <td>${a.nombre}</td>
                <td style="color:red;">Ausente</td>
                <td><span class="badge-motivo">${a.razon}</span></td>
                <td>${a.detalle || '-'}</td>
            </tr>`;
        });

    } catch(e){
        tabla.innerHTML = "<tr><td colspan='4'>Error</td></tr>";
    }
}

cargarAusencias();

</script>

</body>
</html>
