<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 🔥 HEADER PRO */
.header {
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 30px;
    color: white;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* LOGOS */
.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

/* ANIMACIÓN SUAVE */
.logo-mep {
    width: 160px;
    transition: transform 0.3s ease;
}

.logo-mep:hover {
    transform: scale(1.08);
}

.logo-escudo {
    width: 90px;
    transition: transform 0.3s ease;
}

.logo-escudo:hover {
    transform: scale(1.1);
}

/* TITULO */
.titulo {
    text-align: center;
    flex: 1;
}

.titulo h1 {
    margin: 0;
    font-size: 22px;
}

/* 🧭 MENÚ PROFESIONAL */
.menu {
    display: flex;
    gap: 15px;
}

.menu a {
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.2);
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.3s;
}

.menu a:hover {
    background: white;
    color: #27ae60;
}

/* SECCIÓN */
.seccion-blanca {
    padding: 30px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .header {
        flex-direction: column;
        text-align: center;
    }

    .menu {
        margin-top: 10px;
    }
}
</style>
</head>

<body>

<!-- 🔥 HEADER PRO -->
<div class="header">

    <div class="logo-container">
        <img src="LOGO MEP.png" class="logo-mep">
        <img src="escudo sin fondo.png" class="logo-escudo">
    </div>

    <div class="titulo">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <!-- 🧭 MENÚ -->
    <div class="menu">
        <a href="index.html">Inicio</a>
        <a href="galeria.html">Galería</a>
        <a href="registro-docentes.html">Registro</a>
        <a href="registrarme.html">Login</a>
    </div>

</div>

</body>
</html>
