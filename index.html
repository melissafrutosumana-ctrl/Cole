<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #0a3d62;
    padding: 10px 20px;
    color: white;
}

.center {
    text-align: center;
    width: 60%;
}

.center img {
    width: 100px;
}

.right {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    text-decoration: none;
    color: white;
    border-radius: 5px;
}

.btn-registro { background-color: #38ada9; }
.btn-login { background-color: #e58e26; }

/* SECCIÓN */
.seccion-blanca {
    padding: 30px;
}

/* CONTENEDOR */
.contenedor {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

/* LOGO */
.steam img {
    width: 200px;
}

/* CARRUSEL */
.carousel-container {
    width: 500px;
    margin: auto;
    text-align: center;
}

.carousel {
    position: relative;
    width: 100%;
    height: 350px;
    overflow: hidden;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slides img {
    position: absolute;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    margin: auto;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}

.slides img.active {
    opacity: 1;
}

/* BOTONES */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 18px;
    border-radius: 5px;
}

.prev { left: 10px; }
.next { right: 10px; }

/* 🔥 TABLA AUSENCIAS */
.tabla-ausencias {
    margin-top: 50px;
    background: #fff;
    border-radius: 10px;
    padding: 20px;
}

.tabla-ausencias h2 {
    text-align: center;
    color: #0a3d62;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #0a3d62;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

tr:hover {
    background: #f2f2f2;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div></div>

    <div class="center">
        <img src="LOGO MEP.png">
        <img src="escudo sin fondo.png">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <div class="right">
        <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
        <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
    </div>
</div>

<!-- SECCIÓN -->
<div class="seccion-blanca">

    <div class="contenedor">

        <!-- LOGO -->
        <div class="steam">
            <a href="galeria.html"><img src="steam.png"></a>
        </div>

        <!-- CARRUSEL -->
        <div class="carousel-container">

            <h2>Anuncios del Colegio</h2>

            <div class="carousel" id="carousel1">
                <div class="slides">
                    <img src="1.jpeg" class="active">
                    <img src="2.jpeg">
                    <img src="3.jpeg">
                    <img src="4.jpeg">
                    <img src="5.jpeg">
                </div>

                <button class="prev" onclick="cambiar(-1)">❮</button>
                <button class="next" onclick="cambiar(1)">❯</button>
            </div>

        </div>

    </div>

    <!-- 🔥 TABLA DE AUSENCIAS -->
    <div class="tabla-ausencias">
        <h2>Ausencias de Docentes</h2>

        <table>
            <thead>
                <tr>
                    <th>Docente</th>
                    <th>Fecha</th>
                    <th>Razón</th>
                    <th>Detalle</th>
                </tr>
            </thead>
            <tbody id="tablaAusencias">
                <tr>
                    <td colspan="4">No hay ausencias registradas</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
let index = 0;
let slides = document.querySelectorAll("#carousel1 .slides img");

function mostrar(i) {
    slides.forEach(img => img.classList.remove("active"));
    slides[i].classList.add("active");
}

function cambiar(direccion) {
    index += direccion;

    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    mostrar(index);
}

let intervalo = setInterval(() => cambiar(1), 4000);

let carrusel = document.getElementById("carousel1");

carrusel.addEventListener("mouseenter", () => clearInterval(intervalo));
carrusel.addEventListener("mouseleave", () => {
    intervalo = setInterval(() => cambiar(1), 4000);
});


// 🔥 CARGAR AUSENCIAS EN TIEMPO REAL
function cargarAusencias() {
    let ausencias = JSON.parse(localStorage.getItem("ausenciasDocente") || "[]");
    let tabla = document.getElementById("tablaAusencias");

    if (ausencias.length === 0) {
        tabla.innerHTML = "<tr><td colspan='4'>No hay ausencias registradas</td></tr>";
        return;
    }

    tabla.innerHTML = "";

    ausencias.forEach(a => {
        tabla.innerHTML += `
        <tr>
            <td>${a.nombre || "Docente"}</td>
            <td>${a.fecha}</td>
            <td>${a.razon}</td>
            <td>${a.detalle}</td>
        </tr>
        `;
    });
}

// 🔄 ACTUALIZA SOLO (TIEMPO REAL)
setInterval(cargarAusencias, 2000);
cargarAusencias();
</script>

</body>
</html>
