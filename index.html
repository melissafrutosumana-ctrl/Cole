<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    padding: 10px 20px;
    color: white;
}

.center {
    text-align: center;
    width: 60%;
}

/* LOGOS */
.logo-mep { width: 220px; }
.logo-escudo { width: 100px; }

.right {
    display: flex;
    gap: 10px;
}

/* BOTONES */
.btn {
    padding: 10px 16px;
    text-decoration: none;
    color: white;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-registro {
    background: linear-gradient(135deg, #38ada9, #079992);
}

.btn-login {
    background: linear-gradient(135deg, #f6b93b, #e58e26);
}

.btn:hover {
    transform: translateY(-2px);
}

/* CONTENEDOR */
.seccion-blanca {
    padding: 30px;
}

.contenedor {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

.steam img {
    width: 200px;
}

/* 🎠 CARRUSEL PRO */
.carousel-container {
    width: 600px;
    margin: auto;
}

.carousel {
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.slides {
    display: flex;
    transition: transform 0.5s ease;
}

.slides img {
    width: 100%;
    height: 380px;
    object-fit: cover;
}

/* BOTONES */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

.carousel-wrapper {
    position: relative;
}

/* TABLA */
.tabla-ausencias {
    margin-top: 50px;
    padding: 25px;
    border-radius: 12px;
    background: #fff;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #27ae60;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .contenedor {
        flex-direction: column;
    }

    .carousel-container {
        width: 95%;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div></div>

    <div class="center">
        <img src="LOGO MEP.png" class="logo-mep">
        <img src="escudo sin fondo.png" class="logo-escudo">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <div class="right">
        <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
        <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
    </div>

</div>

<!-- CONTENIDO -->
<div class="seccion-blanca">

<div class="contenedor">

<!-- LOGO -->
<div class="steam">
    <a href="galeria.html"><img src="steam.png"></a>
</div>

<!-- CARRUSEL PRO -->
<div class="carousel-container">

<h2 style="text-align:center;">Anuncios del Colegio</h2>

<div class="carousel-wrapper">

    <button class="nav-btn prev" onclick="mover(-1)">❮</button>
    <button class="nav-btn next" onclick="mover(1)">❯</button>

    <div class="carousel">
        <div class="slides" id="slides">
            <img src="1.jpeg">
            <img src="2.jpeg">
            <img src="3.jpeg">
            <img src="4.jpeg">
            <img src="5.jpeg">
        </div>
    </div>

</div>

</div>

</div>

<!-- TABLA -->
<div class="tabla-ausencias">
<h2 style="text-align:center;">Ausencias de Docentes</h2>

<table>
<thead>
<tr>
<th>Docente</th>
<th>Materia</th>
<th>Fecha</th>
<th>Razón</th>
<th>Detalle</th>
</tr>
</thead>
<tbody id="tablaAusencias"></tbody>
</table>

</div>

</div>

<script>

// 🎠 CARRUSEL PRO
let index = 0;
const slides = document.getElementById("slides");

function mover(direccion){
    const total = slides.children.length;
    index += direccion;

    if(index < 0) index = total - 1;
    if(index >= total) index = 0;

    slides.style.transform = `translateX(-${index * 100}%)`;
}

// AUTO
setInterval(() => mover(1), 4000);

// SWIPE
let startX = 0;

slides.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slides.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    if(startX > endX) mover(1);
    else mover(-1);
});


// TABLA
function cargarAusencias(){
    let datos = JSON.parse(localStorage.getItem("ausenciasDocente") || "[]");
    let tabla = document.getElementById("tablaAusencias");

    if(datos.length === 0){
        tabla.innerHTML = "<tr><td colspan='5'>No hay datos</td></tr>";
        return;
    }

    tabla.innerHTML = "";

    datos.forEach(a=>{
        tabla.innerHTML += `
        <tr>
            <td>${a.nombre || "Docente"}</td>
            <td>${a.materia || "-"}</td>
            <td>${a.fecha}</td>
            <td>${a.razon}</td>
            <td>${a.detalle}</td>
        </tr>`;
    });
}

setInterval(cargarAusencias, 1000);
cargarAusencias();

</script>

</body>
</html>
