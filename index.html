<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP de Matapalo - Inicio</title>

    <style>
        :root {
            --verde-primario: #27ae60;
            --verde-claro: #2ecc71;
            --azul-oscuro: #2c3e50;
            --gris-fondo: #f4f7f6;
            --blanco: #ffffff;
            --naranja: #f39c12;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-fondo);
            color: #333;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--verde-claro), var(--verde-primario));
            padding: 30px 20px;
            color: white;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .logo-mep { width: 220px; filter: brightness(0) invert(1); }
        .logo-escudo { width: 80px; }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* BOTONES FLOTANTES */
        .nav-actions {
            position: absolute;
            right: 20px;
            top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-registro { background: #16a085; }
        .btn-login { background: var(--naranja); }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid-superior {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 50px;
        }

        .card-steam {
            background: var(--blanco);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-top: 5px solid var(--verde-primario);
        }

        .card-steam img { width: 180px; margin-bottom: 20px; }

        .carousel-box {
            background: var(--blanco);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .carousel {
            overflow: hidden;
            border-radius: 10px;
            height: 400px;
        }

        .slides { display: flex; transition: transform 0.6s ease; height: 100%; }
        .slides img { width: 100%; min-width: 100%; object-fit: cover; }

        /* COMUNICADOS */
        .titulo-seccion {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 10px;
        }

        .titulo-seccion::after {
            content: '';
            width: 60px; height: 4px;
            background: var(--verde-primario);
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
        }

        .comunicados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .comunicado-card {
            background: var(--blanco);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .comunicado-card .meta { font-size: 0.75rem; color: #888; }
        .comunicado-card h3 { margin: 10px 0; color: var(--azul-oscuro); }

        /* TABLA */
        .tabla-container {
            background: var(--blanco);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; background: #f8f9fa; border-bottom: 3px solid var(--verde-primario); }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .badge-motivo {
            background: #e1f5fe; color: #0288d1;
            padding: 4px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: bold;
        }

        @media (max-width: 900px) {
            .grid-superior { grid-template-columns: 1fr; }
            .nav-actions { position: static; justify-content: center; margin-bottom: 20px; }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="nav-actions">
            <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
            <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
        </div>
        <div class="header-logos">
            <img src="LOGO MEP.png" class="logo-mep">
            <img src="escudo sin fondo.png" class="logo-escudo">
        </div>
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </header>

    <main class="container">
        <div class="grid-superior">
            <section class="card-steam">
                <a href="galeria.html"><img src="steam.png" alt="STEAM"></a>
                <h3>Enfoque STEAM</h3>
                <p>Educación basada en proyectos científicos y ambientales.</p>
            </section>

            <section class="carousel-box">
                <div class="carousel">
                    <div class="slides" id="slides">
                        <img src="1.jpeg"> <img src="2.jpeg"> <img src="3.jpeg"> <img src="4.jpeg"> <img src="5.jpeg">
                    </div>
                </div>
            </section>
        </div>

        <section>
            <h2 class="titulo-seccion">Comunicados Recientes</h2>
            <div class="comunicados-grid" id="contenedorComunicados">
                <p style="text-align: center; grid-column: 1/-1;">Buscando anuncios...</p>
            </div>
        </section>

        <section>
            <h2 class="titulo-seccion">Personal Ausente Hoy</h2>
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Docente</th>
                            <th>Período</th>
                            <th>Motivo</th>
                            <th>Actividad / Observaciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAusencias">
                        <tr><td colspan="4" style="text-align:center;">Cargando información...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // CARRUSEL
        let idx = 0;
        setInterval(() => {
            const slides = document.getElementById("slides");
            if(slides) {
                idx = (idx + 1) % 5;
                slides.style.transform = `translateX(-${idx * 100}%)`;
            }
        }, 5000);

        // CONFIG
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

        // CARGAR COMUNICADOS (Borrador lógico: últimas 24h)
        async function cargarComunicados() {
            const contenedor = document.getElementById("contenedorComunicados");
            const tiempoCorte = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?creado_en=gt.${tiempoCorte}&order=creado_en.desc`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const datos = await res.json();

                if (!datos.length) {
                    contenedor.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#888;'>No hay comunicados recientes.</p>";
                    return;
                }

                contenedor.innerHTML = "";
                datos.forEach(c => {
                    const hora = new Date(c.creado_en).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    contenedor.innerHTML += `
                        <div class="comunicado-card" style="border-left: 6px solid ${c.color_borde}">
                            <span class="meta">Publicado hoy a las ${hora} • Por: ${c.autor}</span>
                            <h3>${c.titulo}</h3>
                            <p>${c.contenido}</p>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        // CARGAR AUSENCIAS (Filtro por rango de fechas: solo hoy)
        async function cargarAusencias() {
            const tabla = document.getElementById("tablaAusencias");
            const hoy = new Date().toISOString().split('T')[0]; // Formato YYYY-MM-DD

            try {
                // Filtramos: fecha_inicio <= hoy Y fecha_fin >= hoy
                const url = `${SUPABASE_URL}/rest/v1/ausencias?fecha=lte.${hoy}&fecha_fin=gte.${hoy}&order=fecha.asc`;
                
                const res = await fetch(url, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const datos = await res.json();

                if (!datos.length) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center;'>✅ Todo el personal se encuentra en la institución.</td></tr>";
                    return;
                }

                tabla.innerHTML = "";
                datos.forEach(a => {
                    const textoPeriodo = (a.fecha === a.fecha_fin) ? "Solo hoy" : `Del ${a.fecha} al ${a.fecha_fin}`;
                    
                    tabla.innerHTML += `
                        <tr>
                            <td><strong>${a.nombre}</strong></td>
                            <td>${textoPeriodo}</td>
                            <td><span class="badge-motivo">${a.razon}</span></td>
                            <td>
                                <b>${a.detalle || ''}</b><br>
                                <small>${a.actividad || 'Sin instrucciones adicionales.'}</small>
                            </td>
                        </tr>`;
                });
            } catch (e) { 
                console.error(e);
                tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red;'>Error al cargar datos.</td></tr>";
            }
        }

        window.onload = () => { 
            cargarComunicados(); 
            cargarAusencias(); 
        };
    </script>
</body>
</html>
