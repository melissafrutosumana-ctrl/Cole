<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Sistema Educativo CTP Matapalo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #008CD0 0%, #005a96 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 50px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 180px;
            height: auto;
        }

        h1 {
            color: #008CD0;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-registro {
            background: #008CD0;
            color: white;
        }

        .btn-registro:hover {
            background: #006a9a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 139, 208, 0.4);
        }

        .btn-login {
            background: #28a745;
            color: white;
        }

        .btn-login:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .info-box {
            background: #f0f8ff;
            border-left: 4px solid #008CD0;
            padding: 15px;
            margin-top: 30px;
            border-radius: 5px;
            text-align: left;
            font-size: 14px;
            color: #333;
        }

        .info-box h3 {
            color: #008CD0;
            margin-bottom: 10px;
        }

        .info-box p {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">
            <img src="escudo sin fondo.png" alt="Logo">
        </div>

        <h1>Colegio Tecnico Profesional de Matapalo</h1>
     </div>
 <div class="container">
        <div class="buttons">
            <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
            <a href="registrarme.html" class="btn btn-login"> Iniciar Sesión</a>
        </div>

      
    </div>
</body>

</html>
