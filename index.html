<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP de Matapalo - Sitio Oficial</title>

    <style>
        :root {
            --verde-primario: #1b5e20;
            --verde-acento: #2e7d32;
            --azul-mep: #0056b3;
            --gris-fondo: #f8fafc;
            --blanco: #ffffff;
            --texto-oscuro: #1e293b;
            --texto-suave: #64748b;
            --borde: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--gris-fondo);
            color: var(--texto-oscuro);
            line-height: 1.6;
        }

        /* HEADER INSTITUCIONAL */
        .header {
            background: var(--blanco);
            padding: 30px 20px;
            color: var(--verde-primario);
            text-align: center;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid var(--verde-primario);
        }

        .header-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-bottom: 15px;
        }

        /* Logos corregidos sin filtros que los vuelvan blancos */
        .logo-mep { height: 65px; width: auto; }
        .logo-escudo { height: 85px; width: auto; }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            color: var(--texto-oscuro);
        }

        /* NAVEGACIÓN ACCIONES */
        .nav-actions {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
        }

        .btn-login {
            padding: 10px 24px;
            border-radius: 8px;
            background: var(--verde-primario);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-login:hover { background: var(--verde-acento); transform: translateY(-2px); }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 25px;
        }

        .grid-superior {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
            margin-bottom: 50px;
        }

        .card-steam {
            background: var(--blanco);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--borde);
        }

        .card-steam img { width: 120px; margin-bottom: 20px; }

        .carousel-box {
            background: var(--blanco);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--borde);
        }

        .carousel {
            overflow: hidden;
            border-radius: 10px;
            height: 400px;
        }

        .slides { display: flex; transition: transform 0.8s ease; height: 100%; }
        .slides img { width: 100%; min-width: 100%; object-fit: cover; }

        .titulo-seccion {
            font-size: 1.6rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--verde-primario);
        }

        .titulo-seccion::before {
            content: '';
            width: 5px;
            height: 25px;
            background: var(--verde-primario);
            border-radius: 2px;
        }

        /* COMUNICADOS */
        .comunicados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .comunicado-card {
            background: var(--blanco);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--borde);
            border-top: 5px solid var(--azul-mep);
        }

        .comunicado-card .meta { font-size: 0.7rem; color: var(--texto-suave); font-weight: bold; }
        .comunicado-card h3 { margin: 10px 0; font-size: 1.1rem; }

        /* TABLA */
        .tabla-container {
            background: var(--blanco);
            border-radius: 12px;
            border: 1px solid var(--borde);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f1f5f9; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--borde); }

        .badge-motivo {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .grid-superior { grid-template-columns: 1fr; }
            .nav-actions { position: static; transform: none; margin-top: 20px; text-align: center; }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-logos">
            <img src="LOGO MEP.png" class="logo-mep" alt="Logo MEP">
            <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP">
        </div>
        <h1>Colegio Técnico Profesional de Matapalo</h1>
        <div class="nav-actions">
            <a href="registrarme.html" class="btn-login">Acceso Personal</a>
        </div>
    </header>

    <main class="container">
        <div class="grid-superior">
            <section class="card-steam">
                <a href="galeria.html"><img src="steam.png" alt="STEAM"></a>
                <h3>Modelo STEAM</h3>
                <p>Educación técnica de vanguardia enfocada en ciencia y tecnología.</p>
            </section>

            <section class="carousel-box">
                <div class="carousel">
                    <div class="slides" id="slides">
                        <img src="1.jpeg"> <img src="2.jpeg"> <img src="3.jpeg"> <img src="4.jpeg"> <img src="5.jpeg">
                    </div>
                </div>
            </section>
        </div>

        <section>
            <h2 class="titulo-seccion">Comunicados Oficiales</h2>
            <div class="comunicados-grid" id="contenedorComunicados">
                <p style="text-align: center; grid-column: 1/-1;">Cargando información reciente...</p>
            </div>
        </section>

        <section>
            <h2 class="titulo-seccion">Personal Ausente Hoy</h2>
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Docente</th>
                            <th>Período</th>
                            <th>Motivo</th>
                            <th>Observaciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAusencias">
                        <tr><td colspan="4" style="text-align:center; padding: 30px;">Verificando asistencia...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // CARRUSEL
        let idx = 0;
        setInterval(() => {
            const slides = document.getElementById("slides");
            if(slides) {
                idx = (idx + 1) % 5;
                slides.style.transform = `translateX(-${idx * 100}%)`;
            }
        }, 5000);

        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';
        const headers = { 
            "apikey": SUPABASE_KEY, 
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        };

        async function cargarComunicados() {
            const contenedor = document.getElementById("contenedorComunicados");
            try {
                // Obtenemos los últimos 6 comunicados sin filtro estricto de 24h para asegurar que se vea algo
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?select=*&order=creado_en.desc&limit=6`, { headers });
                const datos = await res.json();

                if (!datos || datos.length === 0) {
                    contenedor.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:#888;'>No hay comunicados disponibles.</p>";
                    return;
                }

                contenedor.innerHTML = "";
                datos.forEach(c => {
                    contenedor.innerHTML += `
                        <div class="comunicado-card" style="border-top-color: ${c.color_borde || '#0056b3'}">
                            <span class="meta">${c.autor}</span>
                            <h3>${c.titulo}</h3>
                            <p>${c.contenido}</p>
                        </div>`;
                });
            } catch (e) { 
                contenedor.innerHTML = "<p>Error al cargar comunicados.</p>";
            }
        }

        async function cargarAusencias() {
            const tabla = document.getElementById("tablaAusencias");
            const hoy = new Date().toISOString().split('T')[0];

            try {
                // Filtro: fecha_inicio <= hoy AND fecha_fin >= hoy
                const url = `${SUPABASE_URL}/rest/v1/ausencias?fecha=lte.${hoy}&fecha_fin=gte.${hoy}&select=*`;
                const res = await fetch(url, { headers });
                const datos = await res.json();

                if (!datos || datos.length === 0) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; padding: 20px;'>No se reportan ausencias para hoy.</td></tr>";
                    return;
                }

                tabla.innerHTML = "";
                datos.forEach(a => {
                    tabla.innerHTML += `
                        <tr>
                            <td><strong>${a.nombre}</strong></td>
                            <td style="color:#d97706; font-weight:600;">${a.fecha === a.fecha_fin ? 'Hoy' : 'Periodo activo'}</td>
                            <td><span class="badge-motivo">${a.razon}</span></td>
                            <td><small>${a.actividad || 'Sin indicaciones'}</small></td>
                        </tr>`;
                });
            } catch (e) { 
                tabla.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Error de conexión.</td></tr>";
            }
        }

        window.onload = () => { 
            cargarComunicados(); 
            cargarAusencias(); 
        };
    </script>
</body>
</html>
