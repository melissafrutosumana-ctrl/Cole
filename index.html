<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Colegio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* CONTENEDOR PRINCIPAL */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #0a3d62;
            padding: 10px 20px;
            color: white;
        }

        /* IZQUIERDA (LOGO STEAM + ANUNCIOS) */
        .left {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20%;
        }

        .left img {
            width: 80px;
        }

        .anuncios {
            margin-top: 10px;
            width: 100%;
            height: 80px;
            background-color: #dcdde1;
            color: #333;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
        }

        /* CENTRO (ESCUDO + TITULO) */
        .center {
            text-align: center;
            width: 60%;
        }

        .center img {
            width: 100px;
        }

        .center h1 {
            margin: 5px 0 0 0;
            font-size: 22px;
        }

        /* DERECHA (BOTONES) */
        .right {
            width: 20%;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ESTILO DE BOTONES */
        .btn {
            padding: 8px 12px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-registro {
            background-color: #38ada9;
        }

        .btn-login {
            background-color: #e58e26;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        
        <!-- IZQUIERDA -->
        <div class="left">
            <img src="steam.png" alt="Logo STEAM">
            <div class="anuncios">
                Espacio para anuncios del colegio
            </div>
        </div>

        <!-- CENTRO -->
        <div class="center">
            <img src="escudo sin fondo.png" alt="Escudo Colegio">
            <h1>Colegio Técnico Profesional de Matapalo</h1>
        </div>

        <!-- DERECHA -->
        <div class="right">
            <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
            <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
        </div>

    </div>

</body>
</html>
