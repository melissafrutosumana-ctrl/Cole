<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTP de Matapalo - Sitio Oficial</title>

    <style>
        :root {
            --verde-base: #0a4c23;
            --verde-suave: #ebe5d9;
            --fondo-sitio: #ebe5d9;
            --blanco: #ffffff;
            --texto-titulo: #0a4c23;
            --texto-cuerpo: #333333;
            --texto-gris: #5a5a5a;
            --borde: #d4ccc0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fondo-sitio);
            color: var(--texto-cuerpo);
            line-height: 1.6;
            overflow-x: hidden;
        }

        img, video {
            max-width: 100%;
            height: auto;
        }

        /* HEADER CREMA - MEJOR VISIBILIDAD DE LOGOS */
        .header {
            background-color: #f5f1e8;
            padding: 15px 0;
            color: #0a4c23;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--verde-base);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-logos-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* LOGO MEP */
        .logo-mep {
            height: 50px;
            object-fit: contain;
        } 

        .divider {
            width: 1px;
            height: 40px;
            background-color: rgba(10, 76, 35, 0.3);
        }

        .logo-gobierno {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-escudo { 
            height: 85px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .btn-login {
            padding: 9px 20px;
            border-radius: 4px;
            background-color: var(--verde-base);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid var(--verde-base);
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: white;
            color: var(--verde-base);
        }

        /* BARRA DE TÍTULO */
        .main-title-bar {
            background: white;
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid var(--borde);
        }

        .main-title-bar h1 {
            margin: 0;
            color: var(--texto-titulo);
            font-size: 1.8rem;
            font-weight: 800;
        }

        /* CONTENIDO */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        .grid-superior { 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 25px; 
            margin-bottom: 50px; 
        }

        .card-steam {
            background: var(--blanco);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid var(--verde-base);
            color: var(--texto-cuerpo);
        }

        .card-steam h3 {
            color: var(--texto-titulo);
        }

        .card-steam p {
            color: var(--texto-gris);
        }

        .card-steam img { width: 130px; margin-bottom: 15px; }

        .carousel-box {
            background: var(--blanco);
            padding: 8px;
            border-radius: 12px;
            border: 2px solid var(--verde-base);
        }

        .carousel { overflow: hidden; border-radius: 8px; height: 380px; }
        .slides { display: flex; transition: transform 0.8s ease; height: 100%; }
        .slides img { width: 100%; min-width: 100%; object-fit: cover; }

        .titulo-seccion {
            font-size: 1.4rem;
            margin-bottom: 25px;
            color: var(--texto-titulo);
            border-left: 6px solid var(--verde-base);
            padding-left: 15px;
        }

        .comunicados-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; 
            margin-bottom: 50px; 
        }

        .comunicado-card {
            background: var(--blanco);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--borde);
            position: relative;
            transition: 0.3s;
            color: var(--texto-cuerpo);
        }

        .comunicado-card:hover {
            transform: translateY(-3px);
            background: var(--verde-suave);
            border-color: var(--verde-base);
            box-shadow: 0 4px 12px rgba(10, 76, 35, 0.15);
        }

        .comunicado-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--verde-base);
            border-radius: 10px 10px 0 0;
        }

        .tabla-container { background: var(--blanco); border-radius: 10px; border: 2px solid var(--verde-base); overflow: hidden; }
        .tabla-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: var(--verde-base); color: white; font-weight: bold; }
        tbody tr { border-bottom: 1px solid var(--borde); }
        tbody tr:hover { background: var(--verde-suave); }
        tbody td { padding: 15px; color: var(--texto-cuerpo); }

        @media (max-width: 900px) {
            .header-container { flex-direction: column; gap: 20px; text-align: center; }
            .grid-superior { grid-template-columns: 1fr; }
            .nav-right { width: 100%; justify-content: center; }
            .carousel { height: 300px; }
        }

        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .logo-gobierno {
                font-size: 0.7rem;
                text-align: center;
            }
            .header-logos-left {
                flex-direction: column;
                justify-content: center;
            }
            .divider {
                display: none;
            }
            .tabla-container, .overflow-auto, .tabla-scroll {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                display: block;
            }
            .tabla-container table, .overflow-auto table, .tabla-scroll table {
                white-space: nowrap;
                min-width: max-content;
            }
            .logo-mep { height: 40px; }
            .logo-escudo { height: 60px; }
            .main-title-bar h1 { font-size: 1.3rem; padding: 0 12px; }
            .container { margin: 24px auto; padding: 0 14px; }
            .card-steam { padding: 22px; }
            .comunicados-grid { grid-template-columns: 1fr; }
            .titulo-seccion { font-size: 1.15rem; margin-bottom: 16px; }
            th, tbody td { padding: 10px; font-size: 0.86rem; }
            .btn-login { padding: 8px 12px; font-size: 0.65rem; }
            .carousel { height: 240px; }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-container">
            <div class="header-logos-left">
                <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
                <div class="divider"></div>
                <div class="logo-gobierno">
                    <strong>Colegio Técnico Profesional</strong><br>de Matapalo
                </div>
            </div>
            
            <div class="nav-right">
                <a href="index.html" title="Inicio">
                    <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
                </a>
                <a href="registrarme.html" class="btn-login">Acceso Personal</a>
            </div>
        </div>
    </header>

    <section class="main-title-bar">
        <h1><i class="fas fa-bell"></i> Sistema de Notificaciones</h1>
    </section>

    <main class="container">
        <div class="grid-superior">
            <section class="card-steam">
                <a href="galeria.html"><img src="steam.png" alt="STEAM"></a>
                <h3>Modelo STEAM</h3>
                <p>Innovación educativa basada en Ciencia y Tecnología.</p>
            </section>

            <section class="carousel-box">
                <div class="carousel">
                    <div class="slides" id="slides">
                        <img src="1.jpeg" alt="Actividad institucional 1"> <img src="2.jpeg" alt="Actividad institucional 2"> <img src="3.jpeg" alt="Actividad institucional 3"> <img src="4.jpeg" alt="Actividad institucional 4"> <img src="5.jpeg" alt="Actividad institucional 5">
                    </div>
                </div>
            </section>
        </div>

        <section>
            <h2 class="titulo-seccion">Comunicados Oficiales</h2>
            <div class="comunicados-grid" id="contenedorComunicados">
                <p style="text-align: center; grid-column: 1/-1;">Cargando anuncios oficiales...</p>
            </div>
        </section>

        <section style="margin-top: 50px;">
            <h2 class="titulo-seccion">Reporte de Asistencia Docente</h2>
            <div class="tabla-scroll">
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Docente</th>
                            <th>Estado</th>
                            <th>Motivo</th>
                            <th>Observaciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAusencias">
                        <tr><td colspan="4" style="text-align:center; padding: 30px;">Actualizando datos...</td></tr>
                    </tbody>
                </table>
            </div>
            </div>
        </section>
    </main>

    <script>
        let idx = 0;
        setInterval(() => {
            const slides = document.getElementById("slides");
            if(slides) {
                idx = (idx + 1) % 5;
                slides.style.transform = `translateX(-${idx * 100}%)`;
            }
        }, 5000);

        const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';
        const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };

        async function cargarComunicados() {
            const contenedor = document.getElementById("contenedorComunicados");
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados?select=*&order=creado_en.desc&limit=6`, { headers });
                const datos = await res.json();
                if (!datos || datos.length === 0) {
                    contenedor.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>No hay anuncios recientes.</p>";
                    return;
                }
                contenedor.innerHTML = "";
                datos.forEach(c => {
                    contenedor.innerHTML += `
                        <article class="comunicado-card">
                            <span style="font-size:0.7rem; color:#666; font-weight:bold;">${c.autor || 'DIRECCIÓN'}</span>
                            <h3 style="margin:10px 0; color:#1b5e20;">${c.titulo}</h3>
                            <p style="font-size:0.9rem;">${c.contenido}</p>
                        </article>`;
                });
            } catch (e) {
                console.error(e);
                contenedor.innerHTML = "<p>Error al cargar comunicados.</p>";
            }
        }

        async function cargarAusencias() {
            const tabla = document.getElementById("tablaAusencias");
            const hoy = new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/ausencias?fecha=lte.${hoy}&fecha_fin=gte.${hoy}&select=*`, { headers });
                const datos = await res.json();
                if (!datos || datos.length === 0) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:20px; color:#666;'>No hay ausencias hoy.</td></tr>";
                    return;
                }
                tabla.innerHTML = "";
                datos.forEach(a => {
                    tabla.innerHTML += `
                        <tr>
                            <td><strong>${a.nombre}</strong></td>
                            <td style="color:#c62828; font-weight:bold;">Ausente</td>
                            <td><span style="background:#ffebee; color:#c62828; padding:3px 8px; border-radius:4px; font-size:0.75rem;">${a.razon}</span></td>
                            <td><small>${a.actividad || 'Sin observaciones'}</small></td>
                        </tr>`;
                });
            } catch (e) {
                console.error(e);
                tabla.innerHTML = "<tr><td colspan='4'>Error de conexión.</td></tr>";
            }
        }

        window.onload = () => { cargarComunicados(); cargarAusencias(); };
    </script>
</body>
</html>
