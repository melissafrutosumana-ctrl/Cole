<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    text-align: center;
    padding: 20px;
    color: white;
}

/* LOGOS */
.logo-mep {
    width: 260px; /* MÁS GRANDE */
}

.logo-escudo {
    width: 90px;
}

/* BOTONES */
.right {
    position: absolute;
    right: 20px;
    top: 20px;
}

.btn {
    padding: 10px 15px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    margin-left: 10px;
}

.btn-registro { background: #16a085; }
.btn-login { background: #f39c12; }

/* CONTENIDO */
.seccion-blanca {
    padding: 40px;
    text-align: center;
}

/* STEAM */
.steam img {
    width: 200px;
}

.steam p {
    max-width: 300px;
    margin: auto;
    font-size: 14px;
    margin-top: 10px;
}

/* 🎠 CARRUSEL CORREGIDO */
.carousel-container {
    width: 500px;
    margin: auto;
}

.carousel-wrapper {
    position: relative;
}

.carousel {
    overflow: hidden;
    border-radius: 15px;
}

.slides {
    display: flex;
    width: 500%;
    transition: transform 0.5s ease;
}

/* 🔥 CLAVE: cada imagen ocupa 100% */
.slides img {
    width: 100%;
    flex-shrink: 0;
    height: 350px;
    object-fit: contain; /* NO CORTA */
    background: #f4f6f7;
}

/* BOTONES */
.nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

/* TABLA */
.tabla-ausencias {
    margin-top: 50px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #27ae60;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="right">
    <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
    <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
</div>

<img src="LOGO MEP.png" class="logo-mep">
<img src="escudo sin fondo.png" class="logo-escudo">

<h1>Colegio Técnico Profesional de Matapalo</h1>

</div>

<!-- CONTENIDO -->
<div class="seccion-blanca">

<div class="steam">
    <img src="steam.png">
    <p>
    Conservación y Promoción de la Reserva Ecológica Institucional como estrategia 
    para la Educación Ambiental desde un enfoque STEAM
    </p>
</div>

<br><br>

<!-- CARRUSEL -->
<div class="carousel-container">

<h2>Anuncios del Colegio</h2>

<div class="carousel-wrapper">

<button class="nav-btn prev" onclick="mover(-1)">❮</button>
<button class="nav-btn next" onclick="mover(1)">❯</button>

<div class="carousel">
    <div class="slides" id="slides">
        <img src="1.jpeg">
        <img src="2.jpeg">
        <img src="3.jpeg">
        <img src="4.jpeg">
        <img src="5.jpeg">
    </div>
</div>

</div>
</div>

<!-- TABLA -->
<div class="tabla-ausencias">
<h2>Ausencias de Docentes</h2>

<table>
<thead>
<tr>
<th>Docente</th>
<th>Materia</th>
<th>Fecha</th>
<th>Razón</th>
<th>Detalle</th>
</tr>
</thead>
<tbody id="tablaAusencias"></tbody>
</table>
</div>

</div>

<script>

// 🎠 CARRUSEL ARREGLADO
let index = 0;
const slides = document.getElementById("slides");

function mover(direccion){
    const total = slides.children.length;
    index += direccion;

    if(index < 0) index = total - 1;
    if(index >= total) index = 0;

    slides.style.transform = `translateX(-${index * 100}%)`;
}

// AUTO
setInterval(() => mover(1), 4000);


// TABLA
function cargarAusencias(){
    let datos = JSON.parse(localStorage.getItem("ausenciasDocente") || "[]");
    let tabla = document.getElementById("tablaAusencias");

    if(datos.length === 0){
        tabla.innerHTML = "<tr><td colspan='5'>No hay datos</td></tr>";
        return;
    }

    tabla.innerHTML = "";

    datos.forEach(a=>{
        tabla.innerHTML += `
        <tr>
            <td>${a.nombre || "Docente"}</td>
            <td>${a.materia || "-"}</td>
            <td>${a.fecha}</td>
            <td>${a.razon}</td>
            <td>${a.detalle}</td>
        </tr>`;
    });
}

setInterval(cargarAusencias, 1000);
cargarAusencias();

</script>

</body>
</html>
