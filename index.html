<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Colegio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #0a3d62;
    padding: 10px 20px;
    color: white;
}

.center {
    text-align: center;
    width: 60%;
}

.center img {
    width: 100px;
}

.right {
    display: flex;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    text-decoration: none;
    color: white;
    border-radius: 5px;
}

.btn-registro { background-color: #38ada9; }
.btn-login { background-color: #e58e26; }

/* SECCIÓN BLANCA */
.seccion-blanca {
    padding: 20px;
    background-color: white;
}

.steam {
    width: 220px;
}

.steam img {
    width: 80px;
    display: block;
    margin: auto;
}

/* CARRUSEL */
.carousel {
    position: relative;
    width: 220px;
    height: 130px;
    margin-top: 10px;
    overflow: hidden;
    border-radius: 5px;
}

.slides img {
    width: 100%;
    height: 130px;
    display: none;
    object-fit: cover;
}

.slides img.active {
    display: block;
}

/* BOTONES */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 3px;
}

.prev { left: 5px; }
.next { right: 5px; }

/* PUNTITOS */
.dots {
    text-align: center;
    margin-top: 5px;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 0 3px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
}

.dot.active {
    background-color: #333;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div></div>

    <div class="center">
        <img src="escudo sin fondo.png">
        <h1>Colegio Técnico Profesional de Matapalo</h1>
    </div>

    <div class="right">
        <a href="registro-docentes.html" class="btn btn-registro">Registro Docente</a>
        <a href="registrarme.html" class="btn btn-login">Iniciar Sesión</a>
    </div>
</div>

<!-- SECCIÓN BLANCA -->
<div class="seccion-blanca">
    <div class="steam">

        <img src="steam.png">

        <!-- CARRUSEL -->
        <div class="carousel">

            <div class="slides">
                <img src="anuncio1.jpg" class="active">
                <img src="anuncio2.jpg">
                <img src="anuncio3.jpg">
                <img src="anuncio4.jpg">
                <img src="anuncio5.jpg">
            </div>

            <button class="prev" onclick="cambiar(-1)">❮</button>
            <button class="next" onclick="cambiar(1)">❯</button>

        </div>

        <!-- PUNTITOS -->
        <div class="dots">
            <span class="dot active" onclick="irA(0)"></span>
            <span class="dot" onclick="irA(1)"></span>
            <span class="dot" onclick="irA(2)"></span>
            <span class="dot" onclick="irA(3)"></span>
            <span class="dot" onclick="irA(4)"></span>
        </div>

    </div>
</div>

<script>
let index = 0;
let slides = document.querySelectorAll(".slides img");
let dots = document.querySelectorAll(".dot");

function mostrarSlide(i) {
    slides.forEach(slide => slide.classList.remove("active"));
    dots.forEach(dot => dot.classList.remove("active"));

    slides[i].classList.add("active");
    dots[i].classList.add("active");
}

function cambiar(direccion) {
    index += direccion;

    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    mostrarSlide(index);
}

function irA(i) {
    index = i;
    mostrarSlide(index);
}

/* AUTOMÁTICO */
setInterval(() => {
    cambiar(1);
}, 4000);
</script>

</body>
</html>
