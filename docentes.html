<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Docentes</title>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #008CD0; color: #333; }

        .header {
            background: #008CD0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header img { height: 60px; object-fit: contain; }
        .header h1 { margin: 0; text-align: center; flex: 1; font-size: 1.5rem; }

        .navbar {
            background: #006a9a;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .info-usuario {
            background: #f0f8ff;
            padding: 20px;
            border-left: 5px solid #008CD0;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        /* SECCIÓN ADMIN */
        #seccionAdmin {
            display: none; /* Se activa por JS si es admin */
            background: #fff3e0;
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #f39c12;
            margin-bottom: 30px;
        }

        form { display: grid; gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        
        label { font-weight: bold; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            padding: 12px 20px;
            background: #008CD0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background: #005f8d; }
        .btn-admin { background: #f39c12; }
        .btn-admin:hover { background: #d38300; }
        .btn-cerrar { background: #d9534f; padding: 8px 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #008CD0; color: white; text-align: left; }
        td, th { padding: 12px; border: 1px solid #eee; }
    </style>
</head>

<body>

<div class="header">
    <img src="escudo sin fondo.png" alt="Escudo">
    <h1 id="saludo">Cargando Panel...</h1>
    <img src="LOGO MEP.png" alt="Logo MEP">
</div>

<div class="navbar">
    <span id="labelBienvenida">Sesión activa</span>
    <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<div class="container">

    <div class="info-usuario">
        <p><b>Nombre:</b> <span id="nombreUsuario">---</span></p>
        <p><b>Usuario:</b> <span id="usuario">---</span></p>
        <p><b>Rol:</b> <span id="rol">---</span></p>
    </div>

    <div id="seccionAdmin">
        <h3 style="color: #e67e22; margin-top: 0;">📢 Crear Comunicado Oficial</h3>
        <form id="formComunicado">
            <div>
                <label>Título del Comunicado</label>
                <input type="text" id="tituloCom" placeholder="Ej: Suspensión de lecciones" required>
            </div>
            <div>
                <label>Mensaje / Contenido</label>
                <textarea id="contenidoCom" rows="3" placeholder="Escriba el anuncio aquí..." required></textarea>
            </div>
            <div>
                <label>Nivel de Importancia (Color)</label>
                <select id="colorCom">
                    <option value="#27ae60">Verde (Informativo)</option>
                    <option value="#3498db">Azul (General)</option>
                    <option value="#f39c12">Naranja (Importante)</option>
                    <option value="#e74c3c">Rojo (Urgente)</option>
                </select>
            </div>
            <button type="submit" class="btn-admin" id="btnPublicar">Publicar Comunicado</button>
        </form>
    </div>

    <hr>

    <h3>Registrar Nueva Ausencia</h3>
    <form id="formMiAusencia">
        <div>
            <label>Fecha de Ausencia</label>
            <input type="date" id="fechaAusenciaDocente" required>
        </div>
        <div>
            <label>Razón de la ausencia</label>
            <select id="razonAusencia" required>
                <option value="">Seleccione una opción</option>
                <option value="Enfermedad">Enfermedad</option>
                <option value="Permiso">Permiso</option>
                <option value="Capacitación">Capacitación</option>
                <option value="Cita Médica">Cita Médica</option>
                <option value="Otro">Otro</option>
            </select>
        </div>
        <div>
            <label>Detalle adicional</label>
            <textarea id="detalleAusencia" rows="2" placeholder="Opcional..."></textarea>
        </div>
        <div>
            <label>Actividad para el Reemplazo</label>
            <textarea id="actividadRemplazo" rows="2" placeholder="Ej: Realizar práctica de la página 20..."></textarea>
        </div>
        <button type="submit" id="btnGuardar">Registrar Ausencia</button>
    </form>

    <hr style="margin-top:40px">

    <h3>Mi Historial de Ausencias</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Razón</th>
                    <th>Detalle</th>
                    <th>Actividad</th>
                </tr>
            </thead>
            <tbody id="tablaMiAusencia">
                <tr><td colspan="4">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTQ1ODcsImV4cCI6MjA5MTE3MDU4N30.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

function inicializar() {
    const nombre = localStorage.getItem('nombre');
    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    if (!nombre || !usuario) {
        window.location.href = "index.html";
        return;
    }

    document.getElementById('nombreUsuario').textContent = nombre;
    document.getElementById('usuario').textContent = usuario;
    document.getElementById('rol').textContent = rol;
    document.getElementById('saludo').textContent = "Bienvenido, " + nombre.split(' ')[0];

    // Mostrar sección de comunicados solo si el rol es admin
    if (rol === 'admin') {
        document.getElementById('seccionAdmin').style.display = 'block';
    }
    
    cargarTablaMiAusencia();
}

// --- LÓGICA DE COMUNICADOS (ADMIN) ---
document.getElementById('formComunicado').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnPublicar');
    btn.disabled = true;

    const datos = {
        titulo: document.getElementById('tituloCom').value,
        contenido: document.getElementById('contenidoCom').value,
        color_borde: document.getElementById('colorCom').value,
        autor: localStorage.getItem('nombre')
    };

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/comunicados`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=minimal"
            },
            body: JSON.stringify(datos)
        });

        if (response.ok) {
            alert("✅ Comunicado publicado con éxito");
            this.reset();
        } else {
            throw new Error("No se pudo publicar");
        }
    } catch (error) {
        alert("❌ Error: " + error.message);
    } finally {
        btn.disabled = false;
    }
});

// --- LÓGICA DE AUSENCIAS ---
document.getElementById('formMiAusencia').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;

    const datos = {
        usuario: localStorage.getItem('usuario'),
        nombre: localStorage.getItem('nombre'),
        rol: localStorage.getItem('rol'),
        fecha: document.getElementById('fechaAusenciaDocente').value,
        razon: document.getElementById('razonAusencia').value,
        detalle: document.getElementById('detalleAusencia').value,
        actividad: document.getElementById('actividadRemplazo').value
    };

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ausencias`, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(datos)
        });

        if (response.ok) {
            alert("✅ Ausencia registrada");
            this.reset();
            cargarTablaMiAusencia();
        }
    } catch (error) {
        alert("❌ Error de conexión");
    } finally {
        btn.disabled = false;
    }
});

async function cargarTablaMiAusencia() {
    const usuarioActivo = localStorage.getItem('usuario');
    const contenedor = document.getElementById('tablaMiAusencia');

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ausencias?usuario=eq.${usuarioActivo}&order=fecha.desc`, {
            headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
        });
        const lista = await response.json();
        
        contenedor.innerHTML = "";
        if (lista.length === 0) {
            contenedor.innerHTML = "<tr><td colspan='4'>No hay registros.</td></tr>";
            return;
        }

        lista.forEach(item => {
            contenedor.innerHTML += `
                <tr>
                    <td>${item.fecha}</td>
                    <td><b>${item.razon}</b></td>
                    <td>${item.detalle || '-'}</td>
                    <td>${item.actividad || '-'}</td>
                </tr>`;
        });
    } catch (error) {
        contenedor.innerHTML = "<tr><td colspan='4'>Error al cargar.</td></tr>";
    }
}

function cerrarSesion() {
    localStorage.clear();
    window.location.href = "index.html";
}

window.onload = inicializar;
</script>
</body>
</html>
