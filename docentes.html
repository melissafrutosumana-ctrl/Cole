<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Registro Docente</title>

<style>
body {
    font-family: Arial;
    background: #008CD0;
}

.form-container {
    max-width: 500px;
    margin: 40px auto;
    padding: 25px;
    background: white;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}

button {
    margin-top: 15px;
    padding: 12px;
    background: #008CD0;
    color: white;
    border: none;
    cursor: pointer;
}

#datosDocente {
    margin-top: 20px;
    background: #f4f4f4;
    padding: 10px;
}
</style>
</head>

<body>

<div class="form-container">

<h2>Registro Docente</h2>

<form id="miFormulario">

<label>Nombre</label>
<input type="text" id="nombre" required>

<label>Email</label>
<input type="email" id="email" required placeholder="correo@mep.go.cr">

<label>Contraseña</label>
<input type="password" id="password" required>

<label>Materia</label>
<textarea id="materia"></textarea>

<!-- SOLO DOCENTE -->
<label>Tipo</label>
<select>
    <option>Docente</option>
</select>

<button type="submit">Guardar</button>

</form>

<!-- BOTÓN AUSENCIA -->
<button onclick="enviarCorreo()">Registrar ausencia</button>

<!-- MOSTRAR DATOS -->
<div id="datosDocente"></div>

</div>

<script>

const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
const SUPABASE_KEY = 'TU_API_KEY_AQUI';

const form = document.getElementById('miFormulario');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    let nombre = document.getElementById('nombre').value;
    let email = document.getElementById('email').value;
    let password = document.getElementById('password').value;
    let materia = document.getElementById('materia').value;

    // VALIDACIÓN MEP
    if (!email.endsWith("@mep.go.cr")) {
        alert("Solo correos @mep.go.cr");
        return;
    }

    await fetch(`${SUPABASE_URL}/rest/v1/todos`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({
            title: nombre,
            user_email: email,
            password: password,
            materia: materia
        })
    });

    alert("Docente guardado");
    form.reset();
    cargarDocente();
});


// MOSTRAR DATOS
async function cargarDocente() {

    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/todos?select=*`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await response.json();

    let contenedor = document.getElementById("datosDocente");
    contenedor.innerHTML = "<h3>Docentes registrados:</h3>";

    data.forEach(docente => {
        contenedor.innerHTML += `
            <p><b>Nombre:</b> ${docente.title}</p>
            <p><b>Email:</b> ${docente.user_email}</p>
            <p><b>Materia:</b> ${docente.materia}</p>
            <hr>
        `;
    });
}

cargarDocente();


// ENVIAR CORREO
function enviarCorreo() {

    let asunto = "Ausencia Docente";
    let mensaje = "Se notifica ausencia del docente.";

    window.location.href = 
    `mailto:melissa.frutos.umana@mep.go.cr?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(mensaje)}`;
}

</script>

</body>
</html>
