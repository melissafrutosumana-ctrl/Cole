<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Panel de Docentes</title>

<style>
body { margin:0; font-family: Arial; background:#008CD0; }

.header {
    background:#008CD0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
    color:white;
}

.header img { height:70px; }

.header h1 {
    margin:0;
    text-align:center;
    flex:1;
}

.navbar {
    background:#006a9a;
    padding:10px;
    display:flex;
    justify-content:space-between;
    color:white;
}

.container {
    max-width:900px;
    margin:40px auto;
    padding:25px;
    background:white;
    border-radius:10px;
}

.info-usuario {
    background:#f0f8ff;
    padding:15px;
    border-left:4px solid #008CD0;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin-top:5px;
}

button {
    margin-top:10px;
    padding:10px;
    background:#008CD0;
    color:white;
    border:none;
    cursor:pointer;
}

table {
    width:100%;
    margin-top:20px;
}

td, th {
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
    <img src="escudo sin fondo.png">
    <h1 id="saludo">Panel de Docentes</h1>
    <img src="LOGO MEP.png">
</div>

<div class="navbar">
    <span>Bienvenido</span>
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<div class="container">

<h2>Información del Docente</h2>

<div class="info-usuario">
<p><b>Nombre:</b> <span id="nombreUsuario"></span></p>
<p><b>Usuario:</b> <span id="usuario"></span></p>
<p><b>Rol:</b> <span id="rol"></span></p>
</div>

<h3>Registrar Ausencia</h3>

<form id="formMiAusencia">

<label>Fecha</label>
<input type="date" id="fechaAusenciaDocente" required>

<label>Razón</label>
<select id="razonAusencia" required>
<option value="">Seleccione</option>
<option>Enfermedad</option>
<option>Permiso</option>
<option>Capacitación</option>
</select>

<label>Detalle</label>
<textarea id="detalleAusencia"></textarea>

<label>Actividad</label>
<textarea id="actividadRemplazo"></textarea>

<button type="submit">Registrar</button>

</form>

<h3>Historial</h3>

<table>
<thead>
<tr>
<th>Fecha</th>
<th>Razón</th>
<th>Detalle</th>
<th>Actividad</th>
</tr>
</thead>

<tbody id="tablaMiAusencia"></tbody>
</table>

</div>

<script>

// 🔐 CONFIG SUPABASE
const SUPABASE_URL = 'https://etdcmuikvtnqfcnlvodh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZGNtdWlrdnRucWZjbmx2b2RoIiwicm9sZSI":"anon","iat":1775594587,"exp":2091170587}.8JHWlTxYRSYEkpipqesHVBKn7QomTXJYHp6Nm6SzU4A';

// 🔐 CARGAR DATOS
function cargarDatosUsuario() {

    const nombre = localStorage.getItem('nombre');
    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    if (!nombre || !usuario) {
        alert("⚠️ Debe iniciar sesión primero");
        window.location.href = "index.html";
        return;
    }

    document.getElementById('nombreUsuario').textContent = nombre;
    document.getElementById('usuario').textContent = usuario;
    document.getElementById('rol').textContent = rol || "profesor";
    document.getElementById('saludo').textContent = "Bienvenido, " + nombre;

    cargarTablaMiAusencia();
}

cargarDatosUsuario();


// 📝 REGISTRAR AUSENCIA
document.getElementById('formMiAusencia').addEventListener('submit', async function(e){

    e.preventDefault();

    const fecha = document.getElementById('fechaAusenciaDocente').value;
    const razon = document.getElementById('razonAusencia').value;

    if (!razon) {
        alert("Seleccione una razón");
        return;
    }

    const detalle = document.getElementById('detalleAusencia').value;
    const actividad = document.getElementById('actividadRemplazo').value;

    try {

        const response = await fetch(`${SUPABASE_URL}/rest/v1/ausencias`, {
            method: "POST",
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                usuario: localStorage.getItem('usuario'),
                nombre: localStorage.getItem('nombre'),
                rol: localStorage.getItem('rol'),
                fecha: fecha,
                razon: razon,
                detalle: detalle,
                actividad: actividad
            })
        });

        if (!response.ok) {
            const error = await response.text();
            alert("❌ Error: " + error);
            return;
        }

        alert("✅ Ausencia registrada correctamente");

        this.reset();
        cargarTablaMiAusencia();

    } catch (error) {
        alert("❌ Error de conexión");
        console.error(error);
    }

});


// 📊 TABLA
async function cargarTablaMiAusencia(){

    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    let url = `${SUPABASE_URL}/rest/v1/ausencias?order=fecha.desc`;

    if (rol !== "admin") {
        url = `${SUPABASE_URL}/rest/v1/ausencias?usuario=eq.${usuario}&order=fecha.desc`;
    }

    const response = await fetch(url, {
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
        }
    });

    const lista = await response.json();
    let tabla = document.getElementById('tablaMiAusencia');

    if(lista.length === 0){
        tabla.innerHTML = "<tr><td colspan='4'>No hay registros</td></tr>";
        return;
    }

    tabla.innerHTML = "";

    lista.forEach(a=>{
        tabla.innerHTML += `
        <tr>
            <td>${a.fecha}</td>
            <td>${a.razon}</td>
            <td>${a.detalle}</td>
            <td>${a.actividad}</td>
        </tr>
        `;
    });
}


// 🔒 CERRAR SESIÓN
function cerrarSesion(){
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
