<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Docentes - CTP Matapalo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --verde-base: #0a4c23;
            --verde-claro: #1a6b3a;
            --crema: #f5f1e8;
            --fondo: #ebe5d9;
            --dorado: #d4a256;
            --rojo: #d9534f;
            --blanco: #ffffff;
            --texto-cuerpo: #333333;
            --texto-gris: #5a5a5a;
            --borde: #d4ccc0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(26, 107, 58, 0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(10, 76, 35, 0.08), transparent 38%),
                var(--fondo);
            color: var(--texto-cuerpo);
            line-height: 1.6;
        }

        /* HEADER CONSISTENTE */
        .header {
            background-color: var(--crema);
            padding: 15px 0;
            color: var(--texto-cuerpo);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--verde-base);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-logos-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-mep {
            height: 50px;
            object-fit: contain;
            transition: transform 0.3s;
        }

        .logo-mep:hover {
            transform: scale(1.05);
        }

        .divider {
            width: 1px;
            height: 40px;
            background-color: rgba(10, 76, 35, 0.3);
        }

        .logo-gobierno {
            text-align: left;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            line-height: 1.2;
            color: var(--verde-base);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo-escudo {
            height: 85px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
            transition: transform 0.3s;
        }

        .logo-escudo:hover {
            transform: scale(1.02);
        }

        /* NAVBAR MEJORADO */
        .navbar {
            background: linear-gradient(90deg, var(--verde-base) 0%, var(--verde-claro) 100%);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--crema);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .navbar-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-weight: 500;
        }

        .navbar-info span {
            opacity: 0.9;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* INFO USUARIO */
        .info-usuario {
            background: var(--blanco);
            padding: 30px;
            border-left: 5px solid var(--verde-claro);
            border-radius: 10px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid var(--borde);
            animation: fadeInUp 0.45s ease;
        }

        .info-item {
            text-align: center;
            margin: 10px 20px;
            flex: 1;
            min-width: 150px;
        }

        .info-item b {
            color: var(--verde-base);
            font-size: 0.75rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .info-item span {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--verde-base);
        }

        /* SECCIÓN ADMIN */
        #seccionAdmin {
            display: none;
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.1) 0%, rgba(230, 126, 34, 0.05) 100%);
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid var(--dorado);
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            animation: fadeInUp 0.5s ease;
        }

        #seccionAdmin h3 {
            color: #e67e22;
            margin-top: 0;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        /* FORMULARIOS */
        form {
            display: grid;
            gap: 20px;
            background: var(--blanco);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid var(--borde);
            animation: fadeInUp 0.55s ease;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* LABELS */
        label {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--verde-base);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
        }

        /* TÍTULOS */
        h3 {
            color: var(--verde-base);
            font-size: 1.4rem;
            margin-top: 50px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 5px solid var(--verde-base);
            padding-left: 10px;
        }

        h3:first-child {
            margin-top: 0;
        }

        /* INPUTS */
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--borde);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background: var(--blanco);
            color: var(--texto-cuerpo);
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }

        input::placeholder, textarea::placeholder {
            color: #bbb;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--verde-claro);
            box-shadow: 0 0 0 3px rgba(10, 76, 35, 0.1);
        }

        /* BOTONES */
        button {
            padding: 12px 24px;
            background: var(--verde-claro);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--verde-base);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(10, 76, 35, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-admin {
            background: var(--dorado);
            color: var(--verde-base);
            width: 100%;
        }

        .btn-admin:hover {
            background: #c09540;
        }

        .btn-cerrar {
            background: var(--rojo);
            color: white;
            padding: 10px 18px;
            font-size: 0.9rem;
            margin: 0;
        }

        .btn-cerrar:hover {
            background: #c91f1f;
        }

        .btn-eliminar {
            background: #c94848;
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            margin: 0;
        }

        .btn-eliminar:hover {
            background: #a73b3b;
        }

        /* TABLAS */
        .tabla-container {
            background: var(--blanco);
            border-radius: 10px;
            border: 1px solid var(--borde);
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            animation: fadeInUp 0.65s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0;
        }

        th {
            background: var(--verde-base);
            color: white;
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--verde-claro);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--borde);
            color: var(--texto-cuerpo);
        }

        tbody tr:hover {
            background: rgba(10, 76, 35, 0.03);
        }

        tbody tr:nth-child(even) {
            background: rgba(10, 76, 35, 0.02);
        }

        tbody tr:nth-child(even):hover {
            background: rgba(10, 76, 35, 0.05);
        }

        /* BADGES */
        .badge-rol {
            background: rgba(10, 76, 35, 0.12);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--verde-base);
            border: 1px solid var(--verde-claro);
            display: inline-block;
            letter-spacing: 0.5px;
        }

        /* HR */
        hr {
            margin: 40px 0;
            border: 0;
            border-top: 1px solid var(--borde);
        }

        .overflow-auto {
            overflow-x: auto;
            margin-bottom: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .header-container {
                flex-wrap: wrap;
                gap: 20px;
                text-align: center;
            }

            .row {
                grid-template-columns: 1fr;
            }

            .info-usuario {
                flex-direction: column;
                align-items: stretch;
                gap: 0;
            }

            .info-item {
                padding: 15px 0;
                margin: 0;
                border-bottom: 1px solid var(--borde);
            }

            .info-item:last-child {
                border-bottom: none;
            }

            .navbar {
                padding: 15px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .navbar-info {
                width: 100%;
                justify-content: space-between;
            }

            .btn-cerrar {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 600px) {
            .header-logos-left {
                gap: 10px;
            }

            .logo-mep {
                height: 40px;
            }

            .logo-escudo {
                height: 60px;
            }

            h3 {
                font-size: 1.1rem;
            }

            .container {
                padding: 0 15px;
            }

            form {
                padding: 15px;
            }

            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>

</head>

<body>

<header class="header">
    <div class="header-container">
        <div class="header-logos-left">
            <img src="LOGO_MEP-removebg-preview.png" class="logo-mep" alt="MEP Costa Rica">
            <div class="divider"></div>
            <div class="logo-gobierno">
                <strong>Colegio Técnico</strong><br>
                de Matapalo
            </div>
        </div>

        <div class="nav-right">
            <img src="escudo sin fondo.png" class="logo-escudo" alt="Escudo CTP Matapalo">
        </div>
    </div>
</header>

<div class="navbar">
    <div class="navbar-info">
        <span><i class="fas fa-clipboard-list"></i> Sesión:</span>
        <span id="rolBadge" class="badge-rol">Cargando...</span>
    </div>
    <button class="btn-cerrar" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
</div>

<div class="container">

    <div class="info-usuario">
        <div class="info-item">
            <b><i class="fas fa-user-circle"></i> Nombre Completo</b>
            <span id="nombreUsuario">---</span>
        </div>
        <div class="info-item">
            <b><i class="fas fa-id-card"></i> Identificador</b>
            <span id="usuario">---</span>
        </div>
        <div class="info-item">
            <b><i class="fas fa-briefcase"></i> Perfil</b>
            <span id="rol">---</span>
        </div>
    </div>

    <div id="seccionAdmin">
        <h3 style="color: #e67e22; margin-top: 0;"><i class="fas fa-megaphone"></i> Publicar Comunicado Oficial</h3>
        <form id="formComunicado">
            <input type="text" id="tituloCom" placeholder="Título del comunicado (Ej: Cambio de horario)" required>
            <textarea id="contenidoCom" rows="2" placeholder="Escriba el mensaje detallado aquí..." required></textarea>
            <select id="colorCom">
                <option value="#27ae60"><i class="fas fa-circle"></i> Informativo (Verde)</option>
                <option value="#3498db"><i class="fas fa-circle"></i> General (Azul)</option>
                <option value="#f39c12"><i class="fas fa-circle"></i> Importante (Naranja)</option>
                <option value="#e74c3c"><i class="fas fa-circle"></i> Urgente (Rojo)</option>
            </select>
            <button type="submit" class="btn-admin" id="btnPublicar"><i class="fas fa-paper-plane"></i> Publicar Comunicado ahora</button>
        </form>
    </div>

    <h3><i class="fas fa-clipboard-plus"></i> Registrar Nueva Ausencia</h3>
    <form id="formMiAusencia">
        <div class="row">
            <div>
                <label for="fechaInicio"><i class="fas fa-calendar-alt"></i> Fecha de Inicio</label>
                <input type="date" id="fechaInicio" required>
            </div>
            <div>
                <label for="fechaFin"><i class="fas fa-calendar-check"></i> Fecha de Finalización</label>
                <input type="date" id="fechaFin" required>
            </div>
        </div>

        <div class="row">
            <div>
                <label for="razonAusencia"><i class="fas fa-list-ul"></i> Motivo de la Ausencia</label>
                <select id="razonAusencia" required>
                    <option value="">-- Seleccionar motivo --</option>
                    <option value="Enfermedad">Enfermedad / Incapacidad</option>
                    <option value="Permiso">Permiso Personal</option>
                    <option value="Capacitación">Capacitación MEP</option>
                    <option value="Cita Médica">Cita Médica</option>
                    <option value="Otro">Otro Motivo</option>
                </select>
            </div>
            <div>
                <label for="detalleAusencia"><i class="fas fa-clipboard"></i> Detalle Breve</label>
                <input type="text" id="detalleAusencia" placeholder="Ej: Cita en la Caja">
            </div>
        </div>

        <div>
            <label for="actividadRemplazo"><i class="fas fa-book"></i> Trabajo para los Estudiantes</label>
            <textarea id="actividadRemplazo" rows="3" placeholder="Describa la práctica o actividad que deben realizar los grupos..."></textarea>
        </div>
        <button type="submit" id="btnGuardar"><i class="fas fa-save"></i> Registrar Período de Ausencia</button>
    </form>

    <hr>

    <h3><i class="fas fa-history"></i> Mi Historial Reciente</h3>
    <div class="overflow-auto">
        <div class="tabla-container">
        <table id="tablaHistorial">
            <thead>
                <tr>
                    <th><i class="fas fa-calendar"></i> Desde</th>
                    <th><i class="fas fa-calendar-check"></i> Hasta</th>
                    <th><i class="fas fa-info-circle"></i> Motivo y Actividad</th>
                    <th><i class="fas fa-cog"></i> Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr><td colspan="4" style="text-align:center;">Cargando sus registros...</td></tr>
            </tbody>
        </table>
        </div>
    </div>

</div>

<script>
const SUPABASE_URL = 'https://iowxlwnosyyqetbvvmuk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvd3hsd25vc3l5cWV0YnZ2bXVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTk4NDYsImV4cCI6MjA5MTc3NTg0Nn0.VZ5VMu0z4nlsZ0hKvDSk4IUluA1yGx9eQCCXzDc5HmU';
const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };

function inicializar() {
    const nombre = localStorage.getItem('nombre');
    const rol = localStorage.getItem('rol');
    const usuario = localStorage.getItem('usuario');

    if (!nombre || !usuario) { globalThis.location.href = "index.html"; return; }

    // Actualizar Textos
    document.getElementById('nombreUsuario').textContent = nombre;
    document.getElementById('usuario').textContent = usuario;
    document.getElementById('rol').textContent = rol;
    document.getElementById('rolBadge').textContent = rol;

    if (rol === 'admin') {
        document.getElementById('seccionAdmin').style.display = 'block';
        document.getElementById('rolBadge').style.background = '#e67e22';
        setupComunicadoListener();
    }

    cargarHistorial();
}

document.getElementById('formMiAusencia').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('btnGuardar');
    const f1 = document.getElementById('fechaInicio').value;
    const f2 = document.getElementById('fechaFin').value;

    if(f2 < f1) return alert("La fecha final no puede ser anterior a la fecha de inicio.");

    btn.disabled = true;
    const datos = {
        usuario: localStorage.getItem('usuario'),
        nombre: localStorage.getItem('nombre'),
        fecha: f1,
        fecha_fin: f2,
        razon: document.getElementById('razonAusencia').value,
        detalle: document.getElementById('detalleAusencia').value,
        actividad: document.getElementById('actividadRemplazo').value
    };

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ausencias`, {
            method: "POST", headers, body: JSON.stringify(datos)
        });
        if(res.ok) {
            alert("✅ Período de ausencia guardado correctamente.");
            this.reset();
            cargarHistorial();
        }
    } catch (err) {
        console.error(err);
        alert("Error de conexión con el servidor.");
    }
    btn.disabled = false;
});

// --- CARGAR HISTORIAL ---
async function cargarHistorial() {
    const user = localStorage.getItem('usuario');
    const tbody = document.getElementById('cuerpoTabla');

    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ausencias?usuario=eq.${encodeURIComponent(user)}&order=fecha.desc`, { headers });
        const datos = await res.json();

        tbody.innerHTML = "";
        if(datos.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No tiene ausencias registradas.</td></tr>";
            return;
        }

        datos.forEach(a => {
            tbody.innerHTML += `
                <tr>
                    <td><b>${a.fecha}</b></td>
                    <td><b>${a.fecha_fin || '---'}</b></td>
                    <td>
                        <span style="color:var(--verde-base); font-weight:bold;">${a.razon}</span><br>
                        <small>${a.actividad || 'Sin actividad asignada'}</small>
                    </td>
                    <td><button class="btn-eliminar" onclick="eliminarAusencia(${a.id})">Eliminar</button></td>
                </tr>`;
        });
    } catch (e) {
        console.error(e);
        tbody.innerHTML = "<tr><td colspan='4'>Error al cargar el historial.</td></tr>";
    }
}

async function eliminarAusencia(id) {
    if(!confirm("¿Seguro que desea eliminar esta ausencia?")) return;
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/ausencias?id=eq.${id}`, {
            method: "DELETE",
            headers
        });
        if(res.ok) {
            alert("✅ Ausencia eliminada.");
            cargarHistorial();
        } else {
            alert("❌ Error al eliminar: " + res.statusText);
        }
    } catch (e) {
        console.error(e);
        alert("Error de conexión.");
    }
}

// Setup comunicado form listener for admin users
function setupComunicadoListener() {
    const form = document.getElementById('formComunicado');
    if (form) {
        form.addEventListener('submit', async function(e){
            e.preventDefault();
            const btn = document.getElementById('btnPublicar');
            btn.disabled = true;
            const datos = {
                titulo: document.getElementById('tituloCom').value,
                contenido: document.getElementById('contenidoCom').value,
                color_borde: document.getElementById('colorCom').value,
                autor: localStorage.getItem('nombre')
            };
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/comunicados`, { method: "POST", headers, body: JSON.stringify(datos) });
                if(res.ok) {
                    alert("✅ Comunicado publicado en la página de inicio.");
                    this.reset();
                } else {
                    const error = await res.json();
                    alert("❌ Error: " + (error.message || res.statusText));
                }
            } catch (e) { alert("Error al publicar: " + e.message); }
            btn.disabled = false;
        });
    }
}

function cerrarSesion() {
    if(confirm("¿Seguro que desea salir del panel?")) {
        localStorage.clear();
        globalThis.location.href = "index.html";
    }
}

window.onload = inicializar;
</script>
</body>
</html>
