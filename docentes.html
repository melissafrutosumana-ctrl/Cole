<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Docentes</title>

<style>
body { margin:0; font-family: Arial; background:#008CD0; }

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    color:white;
}

.container {
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
    <h2 id="saludo">Panel de Docentes</h2>
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<div class="container">

<h3>Información</h3>

<p><b>Nombre:</b> <span id="nombreUsuario"></span></p>
<p><b>Usuario:</b> <span id="usuario"></span></p>
<p><b>Rol:</b> <span id="rol"></span></p>

<div id="panelAdmin" style="display:none;">
    <h3>👑 Panel Administrador</h3>
    <p>Solo visible para admins</p>
</div>

</div>

<script>

// 🔐 CARGAR SESIÓN
const nombre = localStorage.getItem('nombre');
const usuario = localStorage.getItem('usuario');
const rol = localStorage.getItem('rol');

// 🔴 SI NO HAY SESIÓN
if (!nombre || !usuario) {
    alert("⚠️ Debe iniciar sesión");
    window.location.href = "index.html";
}

// ✅ MOSTRAR DATOS
document.getElementById('nombreUsuario').textContent = nombre;
document.getElementById('usuario').textContent = usuario;
document.getElementById('rol').textContent = rol || "profesor";

// 👋 SALUDO PERSONALIZADO
document.getElementById('saludo').textContent = "Bienvenido, " + nombre;

// 👑 MOSTRAR PANEL ADMIN
if (rol === "admin") {
    document.getElementById('panelAdmin').style.display = "block";
}

// 🔒 CERRAR SESIÓN
function cerrarSesion(){
    localStorage.clear();
    window.location.href = "index.html";
}

</script>

</body>
</html>
